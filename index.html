          +(a.due?'<span class="mono" style="font-size:10px;color:var(--mute)">'+esc(String(a.due).slice(0,10))+'</span>':'')+'</div>'
          +(a.source?'<div style="font-size:10.5px;color:var(--mute);margin-top:5px">'+esc(a.source)+'</div>':'')
          +(next?'<div style="margin-top:8px"><button class="btn" onclick="App.moveAction('+a._idx+',\''+next+'\')">→ '+next+'</button></div>':'')
          +'</div>';
      }).join('');
      return '<div style="background:var(--cardsoft);border:1px solid var(--hairline);border-radius:10px;padding:12px;min-height:120px">'
        +'<div style="display:flex;justify-content:space-between;align-items:baseline"><span class="mono" style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft);font-weight:600">'+st+'</span><span class="mono" style="font-size:10px;color:var(--mute)">'+groups[st].length+'</span></div>'
        +cards+'</div>';
    }).join('');
    return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:14px">'+colHtml+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'
      +'<input id="newActTitle" placeholder="New action…" style="flex:2;min-width:200px;background:var(--paper);border:1px solid #E3E0D8;border-radius:8px;padding:9px 12px;font-size:12.5px;outline:none">'
      +'<input id="newActOwner" placeholder="Owner" style="flex:1;min-width:100px;background:var(--paper);border:1px solid #E3E0D8;border-radius:8px;padding:9px 12px;font-size:12.5px;outline:none">'
      +'<input id="newActDue" type="date" style="background:var(--paper);border:1px solid #E3E0D8;border-radius:8px;padding:8px 12px;font-size:12.5px;outline:none">'
      +'<button class="btn primary" onclick="App.submitAction()">Add</button></div>';
  },
  addAction: function(title){
    this.go('ov');
    var el = document.getElementById('newActTitle');
    if (el){ el.value = title; el.scrollIntoView({behavior:'smooth', block:'center'}); el.focus(); }
  },
  submitAction: function(){
    var t = document.getElementById('newActTitle').value.trim();
    if (!t) return;
    var card = {title:t, owner:document.getElementById('newActOwner').value.trim(),
      due:document.getElementById('newActDue').value, source:'Dashboard', status:'To do'};
    var self = this;
    this.data.actions.push({id:'tmp_'+Date.now(), title:card.title, owner:card.owner, due:card.due, source:card.source, status:'To do'});
    this.renderAll();
    this.post({action:'addAction', card:card}).catch(function(){ /* stays local until next refresh */ });
  },
  moveAction: function(idx, status){
    var a = (this.data.actions||[])[idx];
    if (!a) return;
    a.status = status; this.renderAll();
    // no id column in ALERTS -> the backend matches by title instead
    var key = (a.id && String(a.id).indexOf('tmp_')!==0) ? a.id : a.title;
    if (key) this.post({action:'updateAction', id:key, status:status}).catch(function(){});
  },

  // ============================================================
  // SCREEN 02 · Brand performance
  // ============================================================
  renderBrands: function(cur, prev, W){
    var el = document.getElementById('scr-bp'), self = this;
    var brands = uniq(this.data.sales,'brand');
    if (!brands.length){ el.innerHTML = '<div class="empty">Add rows to the <span class="mono">REVENUE</span> tab to see brand scorecards.</div>'; return; }

    var cards = brands.map(function(b, bi){
      var meta = self.brandCols[b]||{col:INK, wash:'#EFEDE6', tag:''};
      var bc = cur.filter(function(r){return r.brand===b;}), bp = prev.filter(function(r){return r.brand===b;});
      var rev = sumBy(bc,'revenue'), revP = sumBy(bp,'revenue');
      var units = sumBy(bc,'units'), unitsP = sumBy(bp,'units');
      var disc = sumBy(bc,'discount'), rets = sumBy(bc,'returns');
      var chRows = self.channelsIn(W.cur).filter(function(r){return r.brand===b;});
      var chRowsP = self.channelsIn(W.prev).filter(function(r){return r.brand===b;});
      var orders = sumBy(chRows,'orders'), ordersP = sumBy(chRowsP,'orders');
      var spend = sumBy(chRows,'adspend');
      var margin = self.marginFor(b, self.F.category==='all'?null:self.F.category);
      var d = fmtDelta(deltaPct(rev,revP));

      // operating costs from the COSTS tab, same date window
      var winFrom = W.cur.length? new Date(W.cur[0]) : null;
      var winTo = W.cur.length? new Date(W.cur[W.cur.length-1] + 7*864e5) : null;
      var opex = 0;
      (self.data.costs||[]).forEach(function(c){
        if (!c._week || !winFrom || c._week<winFrom || c._week>=winTo) return;
        if (c.brand && c.brand!==b) return;
        opex += num(c.amount);
      });
      var grossProfit = rev*margin - disc*0.5;
      var opProfit = opex>0 ? grossProfit - opex : null;

      var rows = [
        ['Units', fmtNum(units), fmtDelta(deltaPct(units,unitsP))],
        ['Orders', orders?fmtNum(orders):'—', fmtDelta(deltaPct(orders,ordersP))],
        ['Avg order value', orders?fmtMoney(rev/orders):'—', {t:'',c:MUTE}],
        ['Discount rate', (rev+disc)?fmtPct(disc/(rev+disc)):'—', {t:'',c:MUTE}],
        ['Return rate', units?fmtPct(rets/units):'—', {t:'',c:MUTE}],
        ['Est. gross margin', fmtPct(margin,0)+' <span style="font-size:10px;color:var(--mute)">est.</span>', {t:'',c:MUTE}],
        ['Operating costs', opex?fmtMoney(opex):'—', {t:'',c:MUTE}],
        ['Est. operating profit', opProfit!=null? fmtMoney(opProfit) : '—', {t:'', c: opProfit!=null ? (opProfit>=0?POS:NEG) : MUTE}],
        ['ROAS', spend?(rev/spend).toFixed(1)+'×':'—', {t:'',c:MUTE}]
      ].map(function(r){
        return '<div style="display:grid;grid-template-columns:1.2fr 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid var(--linesoft);align-items:baseline"><span style="font-size:12px;color:var(--soft)">'+r[0]+'</span><span style="font-weight:600;font-size:13.5px;font-variant-numeric:tabular-nums">'+r[1]+'</span><span class="delta" style="color:'+r[2].c+'">'+r[2].t+'</span></div>';
      }).join('');

      // channel mix
      var mix = groupSum(bc,'channel','revenue');
      var mixKeys = Object.keys(mix).sort(function(a,bk){return mix[bk]-mix[a];});
      var mixTotal = mixKeys.reduce(function(s,k){return s+mix[k];},0)||1;
      var mixBar = mixKeys.map(function(k,i){
        return '<div style="width:'+(mix[k]/mixTotal*100).toFixed(1)+'%;background:'+CAT_COLS[i%5]+';border-right:2px solid var(--card)" title="'+esc(k)+' · '+fmtMoney(mix[k])+'"></div>';
      }).join('');
      var mixLgd = mixKeys.map(function(k,i){
        return '<span style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:2px;background:'+CAT_COLS[i%5]+'"></span>'+esc(k)+' '+fmtPct(mix[k]/mixTotal,0)+'</span>';
      }).join('');

      // geography
      var geo = groupSum(bc,'geo','revenue');
      var geoKeys = Object.keys(geo).sort(function(a,bk){return geo[bk]-geo[a];});
      var geoMax = geoKeys.length? geo[geoKeys[0]] : 1;
      var geos = geoKeys.map(function(g){
        return '<div style="display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;padding:4px 0"><span style="font-size:11.5px;color:var(--soft)">'+esc(g)+'</span><div class="bar" style="height:6px"><div style="width:'+(geo[g]/geoMax*100).toFixed(0)+'%;background:'+meta.col+'"></div></div><span class="mono" style="font-size:10.5px;color:var(--soft)">'+fmtPct(geo[g]/(mixTotal),0)+'</span></div>';
      }).join('');

      // categories
      var cats = groupSum(bc,'category','revenue');
      var catChips = Object.keys(cats).sort(function(a,bk){return cats[bk]-cats[a];}).slice(0,6).map(function(c){
        return '<span style="border:1px solid var(--line);border-radius:999px;padding:4px 11px;font-size:11px;font-weight:500;background:var(--cardsoft)">'+esc(c)+' · '+fmtMoney(cats[c])+'</span>';
      }).join('');

      var note = rev>revP ? 'Momentum is with this house — protect what is working before funding new bets.'
               : revP>0 ? 'Softer than the prior window. The mix bars above say where to look first.'
               : 'First weeks of data. Comparisons unlock as history builds.';

      return '<div class="card" style="padding:22px">'
        +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<span style="width:12px;height:12px;border-radius:50%;background:'+meta.col+'"></span>'
        +'<div style="font-family:var(--serif);font-size:22px">'+esc(b)+'</div>'
        +(meta.tag?'<span class="pill" style="background:'+meta.wash+';color:'+meta.col+'">'+esc(meta.tag)+'</span>':'')
        +'<span class="delta" style="margin-left:auto;color:'+d.c+'">'+d.t+'</span></div>'
        +'<div style="font-family:var(--serif);font-size:38px;margin-top:12px;line-height:1">'+fmtMoney(rev)+'</div>'
        +'<div style="font-size:11px;color:var(--mute);margin-top:4px">Revenue · this window</div>'
        +'<div style="margin-top:14px;border-top:1px solid var(--hairline)">'+rows+'</div>'
        +'<div class="kicker" style="margin-top:16px">Channel mix</div>'
        +'<div style="display:flex;height:14px;border-radius:7px;overflow:hidden;margin-top:8px">'+(mixBar||'')+'</div>'
        +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">'+mixLgd+'</div>'
        +'<div class="kicker" style="margin-top:16px">Geography</div><div style="margin-top:8px">'+(geos||'<span style="font-size:11px;color:var(--mute)">no geo data</span>')+'</div>'
        +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">'+catChips+'</div>'
        +'<div style="font-family:var(--serif);font-style:italic;font-size:15px;color:var(--soft);border-top:1px dashed var(--line);margin-top:16px;padding-top:12px;line-height:1.5">'+note+'</div>'
        +'</div>';
    }).join('');

    // margin week by week (estimated)
    var rhythmW = this.F.period==='all' ? this.weeks : this.weeks.slice(-24);
    var mSeries = brands.map(function(b){
      var series = rhythmW.map(function(t){
        var rows = self.data.sales.filter(function(r){ return r._week && r._week.getTime()===t && r.brand===b && self.matches(r); });
        var rev = sumBy(rows,'revenue'), disc = sumBy(rows,'discount');
        if (!rev) return null;
        var gm = 0;
        rows.forEach(function(r){ gm += num(r.revenue) * self.marginFor(b, r.category); });
        return (gm - disc*0.5) / rev * 100;
      });
      return {b:b, s:series.map(function(v){return v==null?0:v;}), col:(self.brandCols[b]||{}).chart||INK};
    });
    var mMax = 80;
    var mPaths = mSeries.map(function(bs){ return '<path d="'+linePath(bs.s,800,180,mMax)+'" fill="none" stroke="'+bs.col+'" stroke-width="2"/>'; }).join('');
    var mLgd = mSeries.map(function(bs){ return '<span style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--soft)"><span style="width:9px;height:9px;border-radius:50%;background:'+bs.col+'"></span>'+esc(bs.b)+'</span>'; }).join('');

    var read = brands.length>1 ? 'Two brands, one honest scorecard — same window, same filters, no excuses.' : 'One brand, one honest scorecard.';
    el.innerHTML =
      '<div class="screenhead"><div class="kicker">02 · Brand performance</div><h2>Two brands, one honest scorecard</h2></div>'
      +'<p class="read">'+read+'</p>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:14px">'+cards+'</div>'
      +'<div class="card" style="margin-top:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px">'
      +'<div><h3>Gross margin, week by week</h3><div class="sub">Estimated from INVENTORY price/cost per category, less half of discounts — the distance between the lines is the strategy conversation</div></div>'
      +'<div style="display:flex;gap:14px;align-items:center">'+mLgd+'</div></div>'
      +'<svg viewBox="0 0 800 180" preserveAspectRatio="none" style="width:100%;height:170px;display:block;margin-top:12px">'
      +'<line x1="0" y1="45" x2="800" y2="45" stroke="#F1EFE8"/><line x1="0" y1="90" x2="800" y2="90" stroke="#F1EFE8"/><line x1="0" y1="135" x2="800" y2="135" stroke="#F1EFE8"/><line x1="0" y1="179" x2="800" y2="179" stroke="#E6E3DA"/>'
      +mPaths+'</svg>'
      +'<div class="mono" style="display:flex;justify-content:space-between;font-size:10px;color:var(--mute);margin-top:6px"><span>'+(rhythmW.length?dshort(new Date(rhythmW[0])):'')+'</span><span>'+(rhythmW.length?dshort(new Date(rhythmW[rhythmW.length-1])):'')+'</span></div>'
      +'</div>';
  },

  // ============================================================
  // SCREEN 03 · Product & inventory
  // ============================================================
  renderProduct: function(cur, prev, W){
    var el = document.getElementById('scr-pi'), self = this;
    var prods = this.data.products.filter(function(p){
      if (self.F.brand!=='all' && p.brand!==self.F.brand) return false;
      if (self.F.category!=='all' && p.category!==self.F.category) return false;
      if (self.F.collection!=='all' && p.collection!==self.F.collection) return false;
      return true;
    });
    var head = '<div class="screenhead"><div class="kicker">03 · Product &amp; inventory</div><h2>What to restock, what to mark down</h2></div>'
      +'<p class="read">Stock is money wearing clothes. This screen pairs what is selling (REVENUE tab) with what is sitting (INVENTORY tab).</p>';
    if (!prods.length){
      el.innerHTML = head + '<div class="empty">Add rows to the <span class="mono">INVENTORY</span> tab — one per SKU with unit_price, unit_cost, quantity_on_hand and reorder_level — to light this screen up.</div>';
      return;
    }

    var active = prods.filter(function(p){ return String(p.status||'').toLowerCase()!=='discontinued'; });
    var oos = active.filter(function(p){ return num(p.stock)<=0 || String(p.status||'').toLowerCase()==='out of stock'; });
    var low = active.filter(function(p){ return num(p.stock)>0 && num(p.reorderlevel)>0 && num(p.stock)<=num(p.reorderlevel); });
    var stockUnits = sumBy(active,'stock');
    var stockValue = 0; active.forEach(function(p){ stockValue += num(p.stock)*num(p.cost); });
    var retailValue = 0; active.forEach(function(p){ retailValue += num(p.stock)*num(p.price); });

    var kpi = function(l,v,s,dc,d){ return '<div class="kpi"><div style="display:flex;justify-content:space-between;gap:8px"><span class="l">'+l+'</span><span class="delta" style="color:'+(dc||MUTE)+'">'+(d||'')+'</span></div><div class="v" style="font-size:26px">'+v+'</div><div class="s">'+s+'</div></div>'; };
    var kpis = [
      kpi('Active SKUs', active.length, prods.length+' total in master'),
      kpi('Stock on hand', fmtNum(stockUnits)+' u', 'across active SKUs'),
      kpi('Stock at cost', fmtMoney(stockValue), 'money sitting on shelves'),
      kpi('Stock at retail', fmtMoney(retailValue), 'if it all sold at full price'),
      kpi('Low stock', low.length, 'at or under reorder level', low.length?AMBER:POS, low.length?'act':'ok'),
      kpi('Out of stock', oos.length, 'money walking out', oos.length?NEG:POS, oos.length?'now':'ok')
    ].join('');

    // category health table
    var catRows = {};
    cur.forEach(function(r){
      var k = (r.category||'—')+'|'+(r.brand||'');
      if (!catRows[k]) catRows[k] = {cat:r.category||'—', brand:r.brand||'', rev:0, units:0, rets:0, disc:0};
      catRows[k].rev += num(r.revenue); catRows[k].units += num(r.units); catRows[k].rets += num(r.returns); catRows[k].disc += num(r.discount);
    });
    var catStock = {};
    active.forEach(function(p){
      var k = (p.category||'—')+'|'+(p.brand||'');
      catStock[k] = (catStock[k]||0) + num(p.stock);
    });
    var weeksN = W.cur.length||1;
    var healthRows = Object.keys(catRows).map(function(k){
      var r = catRows[k], stock = catStock[k]||0;
      var sellThrough = (r.units+stock)>0 ? r.units/(r.units+stock) : 0;
      var weeklyRate = r.units/weeksN;
      var cover = weeklyRate>0 ? stock/weeklyRate : null;
      var retRate = r.units>0 ? r.rets/r.units : 0;
      var gm = self.marginFor(r.brand, r.cat);
      var meta = self.brandCols[r.brand]||{col:INK};
      var pill, pbg, pcol;
      if (cover!=null && cover<2 && sellThrough>0.5){ pill='Restock'; pbg='#F8EAE5'; pcol=NEG; }
      else if (cover!=null && cover>12){ pill='Markdown?'; pbg='#F7EEDD'; pcol=AMBER; }
      else { pill='Healthy'; pbg='#E7F2EB'; pcol=POS; }
      var stw = Math.min(100, sellThrough*100);
      var stc = sellThrough>0.6?POS: sellThrough>0.3?AMBER:NEG;
      return {rev:r.rev, html:'<tr>'
        +'<td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+meta.col+';margin-right:8px"></span><span style="font-weight:600">'+esc(r.cat)+'</span><span style="color:var(--mute);font-size:11px"> · '+esc(r.brand)+'</span></td>'
        +'<td class="r">'+fmtMoney(r.rev)+'</td>'
        +'<td class="r" style="color:var(--soft)">'+fmtNum(r.units)+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:90px;height:6px"><div style="width:'+stw.toFixed(0)+'%;background:'+stc+'"></div></div><span class="mono" style="font-size:10.5px">'+fmtPct(sellThrough,0)+'</span></div></td>'
        +'<td class="r">'+fmtPct(gm,0)+'</td>'
        +'<td class="r" style="color:'+(retRate>0.08?NEG:'var(--soft)')+'">'+fmtPct(retRate)+'</td>'
        +'<td class="r" style="color:var(--soft)">'+(cover==null?'—':cover.toFixed(1)+' wk')+'</td>'
        +'<td><span class="pill" style="background:'+pbg+';color:'+pcol+'">'+pill+'</span></td></tr>'};
    }).sort(function(a,b){return b.rev-a.rev;}).map(function(x){return x.html;}).join('');

    // needs a decision + stockout lists
    var stockoutHtml = oos.concat(low).slice(0,8).map(function(p){
      var isOut = num(p.stock)<=0;
      var meta = self.brandCols[p.brand]||{col:INK};
      return '<div style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--linesoft);align-items:flex-start;flex-wrap:wrap">'
        +'<span style="width:9px;height:9px;border-radius:2px;background:'+meta.col+';flex:none;margin-top:4px"></span>'
        +'<div style="flex:1;min-width:200px"><div style="font-size:12.5px;font-weight:600">'+esc(p.product)+'</div>'
        +'<div style="font-size:11px;color:var(--soft);margin-top:2px">'+esc(p.category||'')+' · '+esc(p.collection||'')+' · '+fmtMoney(num(p.price))+'</div></div>'
        +'<div style="text-align:right"><div class="mono" style="font-size:12px;font-weight:600;color:'+(isOut?NEG:AMBER)+'">'+(isOut?'OUT':num(p.stock)+' left')+'</div>'
        +'<div class="mono" style="font-size:9.5px;color:var(--mute);text-transform:uppercase">reorder at '+num(p.reorderlevel)+'</div></div></div>';
    }).join('') || '<div style="font-size:12.5px;color:var(--soft);padding:10px 0">Nothing at risk right now.</div>';

    // markdown depth by category
    var mdRows = Object.keys(catRows).map(function(k){
      var r = catRows[k];
      var gross = r.rev + r.disc;
      return {cat:r.cat+' · '+r.brand, pct: gross>0? r.disc/gross : 0};
    }).sort(function(a,b){return b.pct-a.pct;}).slice(0,8);
    var mdMax = mdRows.length? Math.max(mdRows[0].pct, 0.01) : 1;
    var mdHtml = mdRows.map(function(m){
      return '<div style="display:grid;grid-template-columns:150px 1fr auto;gap:10px;align-items:center;padding:6px 0"><span style="font-size:12px;color:var(--soft)">'+esc(m.cat)+'</span><div class="bar"><div style="width:'+(m.pct/mdMax*100).toFixed(0)+'%;background:'+AMBER+'"></div></div><span class="mono" style="font-size:11px;font-variant-numeric:tabular-nums">'+fmtPct(m.pct)+'</span></div>';
    }).join('') || '<div style="font-size:12px;color:var(--mute)">No discounts recorded.</div>';

    el.innerHTML = head
      +'<div class="grid gk" style="margin-top:0">'+kpis+'</div>'
      +'<div class="card" style="margin-top:14px"><h3>Category health</h3><div class="sub">Revenue &amp; returns follow your filters · sell-through = sold ÷ (sold + in stock) · cover = weeks of stock at current run rate</div>'
      +'<div class="tblwrap"><table class="tbl" style="min-width:940px"><thead><tr><th>Category</th><th style="text-align:right">Revenue</th><th style="text-align:right">Units</th><th>Sell-through</th><th style="text-align:right">GM% est.</th><th style="text-align:right">Returns</th><th style="text-align:right">Cover</th><th>Status</th></tr></thead><tbody>'+healthRows+'</tbody></table></div></div>'
      +'<div class="grid g2">'
      +'<div class="card"><h3>Stockout risk — money walking out</h3>'+stockoutHtml+'</div>'
      +'<div class="card"><h3>Markdown depth by category</h3><div class="sub">Share of gross revenue given away as discount, this window</div><div style="margin-top:10px">'+mdHtml+'</div></div>'
      +'</div>';
  },

  // ============================================================
  // SCREEN 04 · Customer & channel
  // ============================================================
  renderCustomer: function(W){
    var el = document.getElementById('scr-cc'), self = this;
    var ch = this.channelsIn(W.cur), chP = this.channelsIn(W.prev);
    var head = '<div class="screenhead"><div class="kicker">04 · Customer &amp; channel</div><h2>Who\'s buying, where, and whether they come back</h2></div>'
      +'<p class="read">Where the money is good, not just where it\'s big.</p>';
    if (!ch.length && !(this.data.customers||[]).length && !this.salesIn(W.cur).length){
      el.innerHTML = head + '<div class="empty">Add rows to the <span class="mono">CHANNELS</span> tab (date, channel_name, impressions, clicks, conversions, cost) and the <span class="mono">CUSTOMERS</span> tab (cohort_month, new_customers, repeat_rate, avg_ltv, acquisition_cost).</div>';
      return;
    }
    var sess = sumBy(ch,'sessions'), sessP = sumBy(chP,'sessions');
    var orders = sumBy(ch,'orders'), ordersP = sumBy(chP,'orders');
    var newC = sumBy(ch,'newcustomers'), newCP = sumBy(chP,'newcustomers');
    var retC = sumBy(ch,'returningcustomers'), retCP = sumBy(chP,'returningcustomers');
    var spend = sumBy(ch,'adspend');
    var conv = sess? orders/sess : 0, convP = sessP? ordersP/sessP : 0;
    var repShare = (newC+retC)? retC/(newC+retC) : 0, repShareP = (newCP+retCP)? retCP/(newCP+retCP) : 0;
    var imp = sumBy(ch,'impressions');
    // no new/returning split in CHANNELS -> latest cohort's repeat_rate from CUSTOMERS
    var cohorts = (this.data.customers||[]).slice().sort(function(a,b){ return (a._month||0)-(b._month||0); });
    var hasSplit = (newC+retC) > 0;
    if (!hasSplit && cohorts.length){
      var rr = num(cohorts[cohorts.length-1].repeat_rate);
      repShare = rr>1 ? rr/100 : rr;
      repShareP = 0;
    }

    // revenue by channel from Sales for economics table
    var cur = this.salesIn(W.cur), prev = this.salesIn(W.prev);
    var revByCh = groupSum(cur,'channel','revenue'), revByChP = groupSum(prev,'channel','revenue');
    var totalRev = Object.keys(revByCh).reduce(function(s,k){return s+revByCh[k];},0)||1;

    var kpi = function(l,v,d,s,invert){ var dd=fmtDelta(d,invert); return '<div class="kpi"><div style="display:flex;justify-content:space-between;gap:8px"><span class="l">'+l+'</span><span class="delta" style="color:'+dd.c+'">'+dd.t+'</span></div><div class="v" style="font-size:26px">'+v+'</div><div class="s">'+s+'</div></div>'; };
    var kpis = [
      kpi('Clicks / visits', fmtNum(sess), deltaPct(sess,sessP), imp? fmtNum(imp)+' impressions' : 'all channels in window'),
      kpi('Conversions', fmtNum(orders), deltaPct(orders,ordersP), 'from CHANNELS tab'),
      kpi('Conversion rate', fmtPct(conv,2), deltaPct(conv,convP), 'conversions ÷ clicks'),
      kpi('Repeat share', repShare?fmtPct(repShare,0):'—', hasSplit? deltaPct(repShare,repShareP) : null, hasSplit? 'of identified customers' : 'latest cohort, CUSTOMERS tab'),
      kpi('ROAS', spend? (totalRev/spend).toFixed(1)+'×' : '—', null, spend? fmtMoney(spend)+' ad spend':'no ad spend logged')
    ].join('');

    // channel economics table
    var chAgg = {};
    ch.forEach(function(r){
      var k = r.channel||'—';
      if (!chAgg[k]) chAgg[k] = {sess:0, orders:0, spend:0, aovW:0, aovN:0};
      chAgg[k].sess += num(r.sessions); chAgg[k].orders += num(r.orders); chAgg[k].spend += num(r.adspend);
      if (num(r.aov)>0){ chAgg[k].aovW += num(r.aov)*num(r.orders); chAgg[k].aovN += num(r.orders); }
    });
    // channels that earn revenue but have no CHANNELS row still belong in the table
    Object.keys(revByCh).forEach(function(k){
      if (k!=='—' && !chAgg[k]) chAgg[k] = {sess:0, orders:0, spend:0, aovW:0, aovN:0};
    });
    var econRows = Object.keys(chAgg).map(function(k){
      var a = chAgg[k], rev = revByCh[k]||0;
      var d = fmtDelta(deltaPct(rev, revByChP[k]||0));
      var aov = a.aovN? a.aovW/a.aovN : (a.orders? rev/a.orders : 0);
      var roas = a.spend? rev/a.spend : null;
      var share = rev/totalRev;
      return {rev:rev, html:'<tr>'
        +'<td style="font-weight:600">'+esc(k)+'</td>'
        +'<td class="r">'+fmtMoney(rev)+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:110px;height:6px"><div style="width:'+(share*100).toFixed(0)+'%;background:var(--ink)"></div></div><span class="mono" style="font-size:10.5px">'+fmtPct(share,0)+'</span></div></td>'
        +'<td class="r"><span class="delta" style="color:'+d.c+'">'+d.t+'</span></td>'
        +'<td class="r">'+(a.sess? fmtPct(a.orders/a.sess,2):'—')+'</td>'
        +'<td class="r">'+(aov?fmtMoney(aov):'—')+'</td>'
        +'<td class="r">'+(roas!=null? roas.toFixed(1)+'×':'—')+'</td></tr>'};
    }).sort(function(a,b){return b.rev-a.rev;}).map(function(x){return x.html;}).join('');

    // new vs repeat per brand
    var splitHtml = uniq(ch,'brand').map(function(b){
      var rows = ch.filter(function(r){return r.brand===b;});
      var n = sumBy(rows,'newcustomers'), rp = sumBy(rows,'returningcustomers');
      var tot = (n+rp)||1;
      var meta = self.brandCols[b]||{col:INK};
      return '<div><div style="display:flex;align-items:center;gap:8px"><span style="width:9px;height:9px;border-radius:50%;background:'+meta.col+'"></span><span style="font-size:12.5px;font-weight:600">'+esc(b)+'</span><span class="mono" style="margin-left:auto;font-size:10.5px;color:var(--soft)">'+fmtPct(rp/tot,0)+' repeat</span></div>'
        +'<div style="display:flex;height:16px;border-radius:8px;overflow:hidden;margin-top:8px"><div style="width:'+(n/tot*100).toFixed(0)+'%;background:var(--line)" title="New · '+fmtNum(n)+'"></div><div style="width:'+(rp/tot*100).toFixed(0)+'%;background:'+meta.col+'" title="Repeat · '+fmtNum(rp)+'"></div></div></div>';
    }).join('');

    // repeat-share trend per brand
    var trendHtml = uniq(ch,'brand').map(function(b){
      var meta = self.brandCols[b]||{chart:INK};
      var series = W.cur.map(function(t){
        var rows = ch.filter(function(r){return r.brand===b && r._week.getTime()===t;});
        var n = sumBy(rows,'newcustomers'), rp = sumBy(rows,'returningcustomers');
        return (n+rp)? rp/(n+rp)*100 : 0;
      });
      return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--linesoft)"><span style="min-width:130px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:'+meta.chart+'"></span>'+esc(b)+'</span>'
        +'<svg viewBox="0 0 120 30" preserveAspectRatio="none" style="flex:1;height:30px"><polyline points="'+sparkPts(series)+'" fill="none" stroke="'+meta.chart+'" stroke-width="1.6"/></svg>'
        +'<span class="mono" style="font-size:11px;font-weight:600">'+(series.length? series[series.length-1].toFixed(0)+'%':'—')+'</span></div>';
    }).join('');

    // geography from sales
    var geo = groupSum(cur,'geo','revenue'), geoP = groupSum(prev,'geo','revenue');
    var geoKeys = Object.keys(geo).filter(function(k){return k!=='—';}).sort(function(a,b){return geo[b]-geo[a];});
    var geoMax = geoKeys.length? geo[geoKeys[0]]:1;
    var geoHtml = geoKeys.map(function(g){
      var d = fmtDelta(deltaPct(geo[g], geoP[g]||0));
      return '<div style="display:grid;grid-template-columns:140px 1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--linesoft)"><span style="font-size:12px;font-weight:500">'+esc(g)+'</span><div class="bar"><div style="width:'+(geo[g]/geoMax*100).toFixed(0)+'%;background:var(--ink)"></div></div><span class="mono" style="font-size:11px;font-variant-numeric:tabular-nums">'+fmtMoney(geo[g])+'</span><span class="delta" style="color:'+d.c+';min-width:52px;text-align:right">'+d.t+'</span></div>';
    }).join('') || '<div style="font-size:12px;color:var(--mute)">Add a geography column value in REVENUE rows.</div>';

    // middle band: real split if CHANNELS carries it, else the CUSTOMERS cohort table
    var midGrid;
    if (hasSplit){
      midGrid = '<div class="grid g2">'
        +'<div class="card"><h3>New vs repeat</h3><div class="sub">Share of identified customers this window</div><div style="margin-top:14px;display:flex;flex-direction:column;gap:16px">'+splitHtml+'</div>'
        +'<div style="display:flex;gap:14px;margin-top:12px"><span style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:2px;background:var(--line)"></span>New</span><span style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:2px;background:var(--ink)"></span>Repeat</span></div></div>'
        +'<div class="card"><h3>Do they come back?</h3><div class="sub">Repeat share, week by week — the slope matters more than the level</div><div style="margin-top:12px">'+trendHtml+'</div></div>'
        +'</div>';
    } else if (cohorts.length){
      var cohortRows = cohorts.slice(-12).reverse().map(function(c){
        var rr = num(c.repeat_rate); rr = rr>1? rr/100 : rr;
        var ltv = num(c.avg_ltv), cac = num(c.acquisition_cost);
        var ratio = cac>0 ? ltv/cac : null;
        return '<tr><td style="font-weight:600">'+esc(String(c.cohort_month).slice(0,10))+'</td>'
          +'<td class="r">'+fmtNum(num(c.new_customers))+'</td>'
          +'<td><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="width:90px;height:6px"><div style="width:'+Math.min(100,rr*100).toFixed(0)+'%;background:'+(rr>0.3?POS:rr>0.15?AMBER:NEG)+'"></div></div><span class="mono" style="font-size:10.5px">'+fmtPct(rr,0)+'</span></div></td>'
          +'<td class="r">'+(ltv?fmtMoney(ltv):'—')+'</td>'
          +'<td class="r">'+(cac?fmtMoney(cac):'—')+'</td>'
          +'<td class="r" style="color:'+(ratio==null?'var(--mute)':ratio>=3?POS:ratio>=1.5?AMBER:NEG)+';font-weight:600">'+(ratio==null?'—':ratio.toFixed(1)+'×')+'</td></tr>';
      }).join('');
      midGrid = '<div class="card" style="margin-top:14px"><h3>Customer cohorts</h3><div class="sub">From the CUSTOMERS tab · LTV:CAC above 3× is healthy, below 1.5× means acquisition is too expensive</div>'
        +'<div class="tblwrap"><table class="tbl" style="min-width:700px"><thead><tr><th>Cohort</th><th style="text-align:right">New customers</th><th>Repeat rate</th><th style="text-align:right">Avg LTV</th><th style="text-align:right">CAC</th><th style="text-align:right">LTV:CAC</th></tr></thead><tbody>'+cohortRows+'</tbody></table></div></div>';
    } else {
      midGrid = '<div class="empty">Add cohort rows to the <span class="mono">CUSTOMERS</span> tab (cohort_month, new_customers, repeat_rate, avg_ltv, acquisition_cost) to see retention here.</div>';
    }

    el.innerHTML = head
      +'<div class="grid gk" style="margin-top:0">'+kpis+'</div>'
      +'<div class="card" style="margin-top:14px"><h3>Channel economics</h3><div class="sub">Revenue from the REVENUE tab · clicks, conversions and spend from the CHANNELS tab</div>'
      +'<div class="tblwrap"><table class="tbl" style="min-width:860px"><thead><tr><th>Channel</th><th style="text-align:right">Revenue</th><th>Share</th><th style="text-align:right">Trend</th><th style="text-align:right">Conv</th><th style="text-align:right">AOV</th><th style="text-align:right">ROAS</th></tr></thead><tbody>'+econRows+'</tbody></table></div></div>'
      + midGrid
      +'<div class="card" style="margin-top:14px"><h3>Geography</h3><div class="sub">Revenue by geo this window · trend vs prior</div><div style="margin-top:12px">'+geoHtml+'</div></div>';
  },

  // ============================================================
  // SCREEN 05 · Competition tracker
  // ============================================================
  renderCompetition: function(W){
    var el = document.getElementById('scr-ct'), self = this;
    var comps = this.data.competitors;
    var head = '<div class="screenhead"><div class="kicker">05 · Competition tracker</div><h2>Who\'s discounting, launching and restocking around us</h2></div>'
      +'<p class="read">Everything here comes from the COMPETITORS tab — one row per thing you spot in the market.</p>';
    if (!comps.length){
      el.innerHTML = head + '<div class="empty">Add rows to the <span class="mono">COMPETITORS</span> tab: date, competitor, type (Launch / Price / Campaign / Store / Collab), title, detail, price_point, channel, link.</div>';
      return;
    }
    // window = same date span as sales window (or last 90 days if no sales)
    var from = W.cur.length ? new Date(W.cur[0]) : new Date(Date.now()-90*864e5);
    var inWin = comps.filter(function(c){ return c._date && c._date>=from; });
    var counts = {};
    inWin.forEach(function(c){ var t=String(c.type||'Other'); counts[t]=(counts[t]||0)+1; });
    var byComp = {};
    inWin.forEach(function(c){ var k=c.competitor||'—'; (byComp[k]=byComp[k]||[]).push(c); });
    var mostActive = Object.keys(byComp).sort(function(a,b){return byComp[b].length-byComp[a].length;})[0]||'—';

    var kpi = function(l,v,s){ return '<div class="kpi"><span class="l">'+l+'</span><div class="v" style="font-size:24px">'+v+'</div><div class="s">'+s+'</div></div>'; };
    var kpis = [
      kpi('Moves logged', inWin.length, 'in this window'),
      kpi('Launches', counts['Launch']||0, 'new product / collection'),
      kpi('Price moves', counts['Price']||0, 'discounts &amp; hikes'),
      kpi('Campaigns', counts['Campaign']||0, 'marketing pushes'),
      kpi('Most active', esc(mostActive), (byComp[mostActive]||[]).length+' moves')
    ].join('');

    var TYPE_COL = {'launch':{bg:'#E9F1F2',col:'#2F6D77'},'price':{bg:'#F7EEDD',col:AMBER},'campaign':{bg:'#F6E9EE',col:'#A13E63'},'store':{bg:'#E7F2EB',col:POS},'collab':{bg:'#EFEDE6',col:'#5D594F'}};
    var cardHtml = Object.keys(byComp).sort(function(a,b){return byComp[b].length-byComp[a].length;}).map(function(name){
      var moves = byComp[name].sort(function(a,b){return b._date-a._date;});
      var prices = moves.map(function(m){return num(m.pricepoint);}).filter(function(v){return v>0;});
      var avgPrice = prices.length? prices.reduce(function(a,b){return a+b;},0)/prices.length : null;
      var typeCounts = {};
      moves.forEach(function(m){ var t=String(m.type||'Other'); typeCounts[t]=(typeCounts[t]||0)+1; });
      var chips = Object.keys(typeCounts).map(function(t){
        var tc = TYPE_COL[t.toLowerCase()]||{bg:'#EFEDE6',col:'#5D594F'};
        return '<span class="pill" style="background:'+tc.bg+';color:'+tc.col+'">'+esc(t)+' × '+typeCounts[t]+'</span>';
      }).join(' ');
      var feed = moves.slice(0,3).map(function(m){
        return '<div style="display:flex;gap:8px;padding:3px 0;font-size:11.5px;line-height:1.45;color:#3E3B33"><span class="mono" style="font-size:9.5px;color:var(--mute);white-space:nowrap;margin-top:2px">'+dshort(m._date)+'</span><span>'+(m.link?'<a href="'+esc(m.link)+'" target="_blank" rel="noopener">':'')+esc(m.title||m.detail||'')+(m.link?'</a>':'')+(m.detail&&m.title?' — '+esc(m.detail):'')+'</span></div>';
      }).join('');
      return '<div class="card" style="padding:18px 20px">'
        +'<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><div style="font-family:var(--serif);font-size:19px">'+esc(name)+'</div>'
        +(avgPrice?'<span class="mono" style="font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute)">avg price point '+fmtMoney(avgPrice)+'</span>':'')+'</div>'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">'+chips+'</div>'
        +'<div style="border-top:1px solid var(--linesoft);margin-top:12px;padding-top:10px">'+feed+'</div>'
        +'</div>';
    }).join('');

    var feedHtml = inWin.sort(function(a,b){return b._date-a._date;}).slice(0,12).map(function(m){
      var tc = TYPE_COL[String(m.type||'').toLowerCase()]||{bg:'#EFEDE6',col:'#5D594F'};
      return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--linesoft);align-items:flex-start">'
        +'<span class="mono" style="font-size:9.5px;color:var(--mute);white-space:nowrap;margin-top:3px">'+dshort(m._date)+'</span>'
        +'<span class="pill" style="background:'+tc.bg+';color:'+tc.col+';margin-top:1px">'+esc(m.type||'—')+'</span>'
        +'<span style="font-size:12px;line-height:1.45"><b>'+esc(m.competitor||'')+'</b> — '+esc(m.title||'')+(m.detail?' · '+esc(m.detail):'')+(m.link?' <a href="'+esc(m.link)+'" target="_blank" rel="noopener">↗</a>':'')+'</span></div>';
    }).join('');

    el.innerHTML = head
      +'<div class="grid gk" style="margin-top:0">'+kpis+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:14px">'+cardHtml+'</div>'
      +'<div class="card" style="margin-top:14px"><h3>Watch feed</h3>'+feedHtml+'</div>';
  },

  // ============================================================
  // SCREEN 06 · Industry watch
  // ============================================================
  renderIndustry: function(W){
    var el = document.getElementById('scr-iw'), self = this;
    var rows = this.data.industry;
    var head = '<div class="screenhead"><div class="kicker">06 · Industry watch</div><h2>Where fashion is drifting — and what that means for us</h2></div>'
      +'<p class="read">Fed by the INDUSTRY tab — point an IMPORTRANGE at your Loomline Trend Radar sheet and this fills itself.</p>';
    if (!rows.length){
      el.innerHTML = head + '<div class="empty">The <span class="mono">INDUSTRY</span> tab is empty. Either paste rows (date, title, source, category, sentiment, score, insight, link) or IMPORTRANGE them from the Loomline spreadsheet.</div>';
      return;
    }
    var sorted = rows.slice().sort(function(a,b){return (b._date||0)-(a._date||0);});

    // category momentum: article count + avg score by category
    var byCat = {};
    rows.forEach(function(r){
      var c = r.category||'—';
      if (!byCat[c]) byCat[c] = {n:0, score:0};
      byCat[c].n++; byCat[c].score += num(r.score);
    });
    var cats = Object.keys(byCat).filter(function(c){return c!=='—';}).sort(function(a,b){return byCat[b].n-byCat[a].n;}).slice(0,8);
    var maxN = cats.length? byCat[cats[0]].n : 1;
    var catHtml = cats.map(function(c,i){
      var avg = byCat[c].score/byCat[c].n;
      var col = avg>=6? POS : avg>=4? AMBER : NEG;
      return '<div style="display:grid;grid-template-columns:170px 1fr auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--linesoft)"><span style="font-size:12.5px;font-weight:500">'+esc(c)+'</span><div class="bar"><div style="width:'+(byCat[c].n/maxN*100).toFixed(0)+'%;background:'+col+'"></div></div><span class="delta" style="color:'+col+';min-width:46px;text-align:right">'+byCat[c].n+' · '+avg.toFixed(1)+'</span></div>';
    }).join('');

    // sentiment mix
    var sent = {};
    rows.forEach(function(r){ var s = String(r.sentiment||'neutral').toLowerCase(); sent[s]=(sent[s]||0)+1; });
    var sentTotal = rows.length||1;
    var SENT_COL = {positive:POS, negative:NEG, neutral:'#A6A192', mixed:AMBER};
    var sentBar = Object.keys(sent).map(function(s){
      return '<div style="width:'+(sent[s]/sentTotal*100).toFixed(1)+'%;background:'+(SENT_COL[s]||'#A6A192')+';border-right:2px solid var(--card)" title="'+esc(s)+' · '+sent[s]+'"></div>';
    }).join('');
    var sentLgd = Object.keys(sent).map(function(s){
      return '<span style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:2px;background:'+(SENT_COL[s]||'#A6A192')+'"></span>'+esc(s)+' '+fmtPct(sent[s]/sentTotal,0)+'</span>';
    }).join('');

    // sources
    var srcs = {};
    rows.forEach(function(r){ var s=r.source||'—'; srcs[s]=(srcs[s]||0)+1; });
    var srcHtml = Object.keys(srcs).sort(function(a,b){return srcs[b]-srcs[a];}).slice(0,8).map(function(s){
      return '<span style="background:var(--paper);border-radius:999px;padding:4px 11px;font-size:10.5px;font-weight:600;color:var(--soft)">'+esc(s)+' · '+srcs[s]+'</span>';
    }).join('');

    // top insights
    var insights = sorted.filter(function(r){return r.insight;}).slice(0,5).map(function(r){
      return '<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--linesoft);font-size:13px;line-height:1.5"><span style="color:var(--hb);font-weight:700">→</span><span>'+esc(r.insight)+'</span></div>';
    }).join('') || '<div style="font-size:12px;color:var(--mute)">No insight column values yet.</div>';

    // feed
    var feedHtml = sorted.slice(0,14).map(function(r){
      var s = String(r.sentiment||'').toLowerCase();
      var col = SENT_COL[s]||'#A6A192';
      return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--linesoft);align-items:baseline">'
        +'<span class="mono" style="font-size:9.5px;color:var(--mute);white-space:nowrap">'+dshort(r._date)+'</span>'
        +'<span style="width:7px;height:7px;border-radius:50%;background:'+col+';flex:none;position:relative;top:-1px" title="'+esc(s)+'"></span>'
        +'<span style="font-size:12.5px;line-height:1.45;flex:1">'+(r.link?'<a href="'+esc(r.link)+'" target="_blank" rel="noopener">':'')+esc(r.title||'')+(r.link?'</a>':'')+'</span>'
        +'<span style="background:var(--paper);border-radius:5px;padding:2px 8px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;color:var(--soft);white-space:nowrap">'+esc(r.source||'')+'</span></div>';
    }).join('');

    el.innerHTML = head
      +'<div class="grid g2" style="margin-top:0">'
      +'<div class="card"><h3>Category momentum</h3><div class="sub">Article volume · average signal score per category</div><div style="margin-top:12px">'+catHtml+'</div></div>'
      +'<div class="card"><h3>Sentiment mix</h3><div class="sub">Across all articles in the feed</div>'
      +'<div style="display:flex;height:14px;border-radius:7px;overflow:hidden;margin-top:14px">'+sentBar+'</div>'
      +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">'+sentLgd+'</div>'
      +'<div class="kicker" style="margin-top:18px">Sources</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">'+srcHtml+'</div></div>'
      +'</div>'
      +'<div class="grid g2">'
      +'<div class="card"><div style="display:flex;align-items:center;gap:9px"><span style="width:10px;height:10px;border-radius:50%;background:var(--hb)"></span><h3>So what for us</h3></div><div style="margin-top:10px">'+insights+'</div></div>'
      +'<div class="card"><h3>Signals this week</h3>'+feedHtml+'</div>'
      +'</div>';
  },

  // ============================================================
  // Ask Balooo
  // ============================================================
  post: function(body){
    return fetch(APPS_SCRIPT_URL, {
      method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); });
  },
  ask: function(){
    var q = document.getElementById('askInput').value.trim();
    if (!q || !APPS_SCRIPT_URL) return;
    var btn = document.getElementById('askBtn'), out = document.getElementById('askAnswer');
    btn.disabled = true; btn.innerHTML = '<span class="spin" style="border-top-color:#F3F2ED;border-color:rgba(243,242,237,.3)"></span>';
    out.style.display='block'; out.textContent = 'Thinking…';

    var W = this.windows();
    var cur = this.salesIn(W.cur), prev = this.salesIn(W.prev);
    var ctx = [
      'Window: '+document.getElementById('windowLabel').textContent,
      'Filters: '+JSON.stringify(this.F),
      'Revenue: '+fmtMoney(sumBy(cur,'revenue'))+' (prior '+fmtMoney(sumBy(prev,'revenue'))+')',
      'Units: '+Math.round(sumBy(cur,'units'))+' · Returns: '+Math.round(sumBy(cur,'returns'))+' · Discount: '+fmtMoney(sumBy(cur,'discount')),
      'Revenue by channel: '+JSON.stringify(groupSum(cur,'channel','revenue')),
      'Revenue by category: '+JSON.stringify(groupSum(cur,'category','revenue')),
      'Revenue by brand: '+JSON.stringify(groupSum(cur,'brand','revenue')),
      'Open flags: '+(this.alerts||[]).map(function(a){return a.title;}).join('; ')
    ].join('\n');

    this.post({
      action:'ask',
      system:'You are the business analyst for two Indian fashion brands, The Hullabalooo and The Pappy Show. Answer from the data snapshot provided. Be direct and specific with numbers; give one clear recommended move. Keep it under 200 words.',
      prompt: 'Data snapshot:\n'+ctx+'\n\nQuestion: '+q
    }).then(function(res){
      out.textContent = res.answer || res.error || 'No answer returned.';
    }).catch(function(err){
      out.textContent = 'Could not reach the backend: '+err.message;
    }).finally(function(){ btn.disabled=false; btn.textContent='Ask'; });
  }
};

App.load();
</script>
</body>
</html>
