<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balooo · Business decision layer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F2ED; --card:#FFFFFF; --cardsoft:#FBFAF7; --ink:#1B1A17; --soft:#5D594F; --mute:#9B9587;
  --line:#E6E3DA; --linesoft:#F1EFE8; --hairline:#EEEBE3; --dark:#161511;
  --hb:#A13E63; --hbW:#F6E9EE; --ps:#2F6D77; --psW:#E9F1F2;
  --hbChart:#A13E63; --psChart:#0B7EA8;
  --pos:#2E7D4F; --posW:#E7F2EB; --neg:#C1442E; --negW:#F8EAE5; --amber:#B7791F; --amberW:#F7EEDD;
  --c1:#A13E63; --c2:#B7791F; --c3:#0B7EA8; --c4:#557426; --c5:#6B5CA5;
  --serif:'Instrument Serif',Georgia,serif; --mono:'Spline Sans Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
a{color:#2F6D77;text-decoration:none}a:hover{color:var(--hb)}
button,input,select,textarea{font-family:inherit}
::selection{background:#EFE3C4}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.wrap{max-width:1560px;margin:0 auto;padding:0 32px}
@media(max-width:640px){.wrap{padding:0 16px}}
.mono{font-family:var(--mono)}
.kicker{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mute)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
.card h3{font-family:var(--serif);font-size:19px;font-weight:400;margin:0}
.card .sub{font-size:11.5px;color:var(--mute);margin-top:3px}
.grid{display:grid;gap:14px;margin-top:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(380px,1fr))}
.gk{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
@media(max-width:480px){.g2{grid-template-columns:1fr}}
.screenhead{margin:6px 0 4px}
.screenhead h2{font-family:var(--serif);font-size:25px;margin:6px 0 0;font-weight:400}
.read{font-family:var(--serif);font-style:italic;font-size:16.5px;color:var(--soft);margin:6px 0 16px;max-width:880px;line-height:1.5}
.pill{border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;white-space:nowrap}
.delta{font-family:var(--mono);font-size:11px;font-weight:600;white-space:nowrap}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-family:var(--mono);font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;font-weight:500}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--linesoft);white-space:nowrap}
.tbl .r{text-align:right;font-variant-numeric:tabular-nums}
.tblwrap{overflow-x:auto;margin-top:12px}
.bar{height:7px;background:var(--linesoft);border-radius:4px;overflow:hidden}
.bar>div{height:100%}
select.f{background:var(--paper);border:1px solid #E3E0D8;border-radius:7px;padding:7px 10px;font-size:12px;color:var(--ink);outline:none;cursor:pointer;max-width:180px}
select.f.dark{background:var(--dark);border-color:var(--dark);color:var(--paper)}
.btn{background:none;border:1px solid #E3E0D8;border-radius:6px;padding:3px 9px;font-size:10.5px;font-weight:600;color:var(--ink);cursor:pointer}
.btn:hover{border-color:var(--mute)}
.btn.primary{background:var(--dark);color:var(--paper);border:none;border-radius:8px;padding:10px 18px;font-size:12.5px}
.tabbtn{appearance:none;background:none;border:none;padding:14px 2px 12px;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:7px;border-bottom:2px solid transparent;color:var(--mute)}
.tabbtn.on{color:var(--ink);border-bottom-color:var(--ink)}
.badge{background:var(--amber);color:#fff;border-radius:999px;font-size:9.5px;padding:1px 6px;font-weight:600}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:7px;text-align:left}
.kpi .l{font-family:var(--mono);font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mute)}
.kpi .v{font-family:var(--serif);font-size:27px;line-height:1}
.kpi .s{font-size:10.5px;color:var(--mute)}
.empty{border:1px dashed var(--line);border-radius:10px;background:var(--cardsoft);padding:16px;font-size:12.5px;color:var(--soft);line-height:1.5;margin-top:12px}
.tt{position:fixed;z-index:200;pointer-events:none;background:var(--dark);color:var(--paper);border-radius:8px;padding:8px 11px;font-size:11.5px;line-height:1.5;box-shadow:0 6px 22px rgba(0,0,0,.25);display:none;max-width:260px}
.tt .mono{font-size:10px;color:rgba(243,242,237,.6)}
#banner{background:var(--amberW);border-bottom:1px solid #eadfbe;color:#6b5410;font-size:12.5px;padding:10px 0;display:none}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
textarea.ask{width:100%;background:var(--paper);border:1px solid #E3E0D8;border-radius:8px;padding:10px 12px;font-size:13px;outline:none;color:var(--ink);resize:vertical;min-height:44px}
.answer{background:var(--cardsoft);border:1px solid var(--hairline);border-radius:10px;padding:14px;font-size:13px;line-height:1.6;color:#3E3B33;margin-top:12px;white-space:pre-wrap;display:none}
</style>
</head>
<body>

<div style="background:var(--dark);color:var(--paper)">
  <div class="wrap" style="padding-top:16px;padding-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
      <div style="font-family:var(--serif);font-style:italic;font-size:30px;line-height:1;letter-spacing:-0.01em">Balooo</div>
      <div class="kicker" style="color:rgba(243,242,237,0.55)">Business decision layer · The Hullabalooo × The Pappy Show</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div class="mono" style="font-size:10.5px;color:rgba(243,242,237,0.6)" id="appDate"></div>
      <button class="btn" style="color:var(--paper);border-color:rgba(243,242,237,0.28)" onclick="App.load(true)" id="refreshBtn">Refresh data</button>
    </div>
  </div>
</div>

<div id="banner"><div class="wrap" id="bannerMsg"></div></div>

<div style="position:sticky;top:0;z-index:60;background:var(--cardsoft);border-bottom:1px solid #E3E0D8">
  <div class="wrap">
    <div style="display:flex;gap:26px;overflow-x:auto" id="tabs"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 0 12px;border-top:1px solid var(--hairline)">
      <select class="f" id="fBrand" onchange="App.setF('brand',this.value)"></select>
      <select class="f dark" id="fPeriod" onchange="App.setF('period',this.value)">
        <option value="4">Last 4 weeks</option>
        <option value="8">Last 8 weeks</option>
        <option value="12" selected>Last 12 weeks</option>
        <option value="24">Last 24 weeks</option>
        <option value="all">All time</option>
      </select>
      <select class="f" id="fChannel" onchange="App.setF('channel',this.value)"></select>
      <select class="f" id="fCategory" onchange="App.setF('category',this.value)"></select>
      <select class="f" id="fCollection" onchange="App.setF('collection',this.value)"></select>
      <select class="f" id="fGeo" onchange="App.setF('geo',this.value)"></select>
      <button class="btn" id="resetBtn" style="display:none;padding:7px 12px;font-size:11.5px;border-radius:7px;color:var(--soft)" onclick="App.resetF()">Reset filters</button>
      <div class="mono" style="margin-left:auto;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute)" id="windowLabel"></div>
    </div>
  </div>
</div>

<div class="wrap" style="padding-top:24px;padding-bottom:60px">
  <div id="loading" style="text-align:center;padding:60px 0;color:var(--soft)"><span class="spin"></span> &nbsp;Loading from Google Sheets…</div>
  <div id="screens" style="display:none">
    <div id="scr-ov"></div>
    <div id="scr-bp" style="display:none"></div>
    <div id="scr-pi" style="display:none"></div>
    <div id="scr-cc" style="display:none"></div>
    <div id="scr-ct" style="display:none"></div>
    <div id="scr-iw" style="display:none"></div>

    <div class="card" style="margin-top:18px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
        <h3 style="font-size:18px">Ask Balooo</h3>
        <span class="mono" style="font-size:10px;color:var(--mute)">Answers use the numbers currently on screen</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px;align-items:flex-start">
        <textarea class="ask" id="askInput" placeholder="e.g. Why is marketplace revenue down, and what should we do this week?"></textarea>
        <button class="btn primary" id="askBtn" onclick="App.ask()">Ask</button>
      </div>
      <div class="answer" id="askAnswer"></div>
    </div>
  </div>
</div>

<div class="wrap mono" style="padding-bottom:40px;font-size:10px;color:var(--mute);letter-spacing:0.04em" id="footer">Balooo · internal decision layer · not for external circulation</div>

<div class="tt" id="tt"></div>

<script>
// ============================================================
// CONFIG — paste your Apps Script /exec URL here
// (or open the page once with ?api=YOUR_URL and it is remembered)
// ============================================================
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuhPsBocseqnAJCfw2dweLfNcD7OzIzwXtDLLw224FtmB2Usy93zwI4PIzDgctkMhoaA/exec';

(function(){
  var q = new URLSearchParams(location.search).get('api');
  if (q) { localStorage.setItem('balooo_api', q); history.replaceState(null,'',location.pathname); }
  if (!APPS_SCRIPT_URL) APPS_SCRIPT_URL = localStorage.getItem('balooo_api') || '';
})();

// ============================================================
// Constants
// ============================================================
var BRAND_META = {
  'the hullabalooo': {col:'#A13E63', chart:'#A13E63', wash:'#F6E9EE', tag:'House of drama'},
  'the pappy show' : {col:'#2F6D77', chart:'#0B7EA8', wash:'#E9F1F2', tag:'Street & play'}
};
var FALLBACK_BRAND_COLS = ['#A13E63','#0B7EA8','#B7791F','#557426','#6B5CA5'];
var CAT_COLS = ['#A13E63','#B7791F','#0B7EA8','#557426','#6B5CA5']; // validated categorical order
var POS='#2E7D4F', NEG='#C1442E', AMBER='#B7791F', INK='#1B1A17', MUTE='#9B9587';

var TABS = [
  {id:'ov', t:'01 · Overview'},
  {id:'bp', t:'02 · Brands'},
  {id:'pi', t:'03 · Product'},
  {id:'cc', t:'04 · Customer'},
  {id:'ct', t:'05 · Competition'},
  {id:'iw', t:'06 · Industry'}
];

// ============================================================
// Utilities
// ============================================================
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function num(v){ if (v==null||v==='') return 0; var n = typeof v==='number' ? v : parseFloat(String(v).replace(/[₹,%\s]/g,'').replace(/,/g,'')); return isNaN(n)?0:n; }
function parseDate(v){
  if (v==null||v==='') return null;
  if (v instanceof Date) return v;
  var d = new Date(v);
  if (!isNaN(d)) return d;
  var m = String(v).match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/); // dd/mm/yyyy
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  return null;
}
function fmtMoney(n){
  var neg = n<0; n = Math.abs(n);
  var s;
  if (n >= 1e7) s = '₹' + (n/1e7).toFixed(n>=1e8?1:2) + ' Cr';
  else if (n >= 1e5) s = '₹' + (n/1e5).toFixed(1) + ' L';
  else if (n >= 1000) s = '₹' + (n/1000).toFixed(1) + 'k';
  else s = '₹' + Math.round(n);
  return (neg?'−':'') + s;
}
function fmtNum(n){
  if (Math.abs(n) >= 1e5) return (n/1e5).toFixed(1)+' L';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'k';
  return String(Math.round(n));
}
function fmtPct(x, dp){ return (x*100).toFixed(dp==null?1:dp) + '%'; }
function deltaPct(cur, prev){ if (!prev) return null; return (cur-prev)/Math.abs(prev); }
function fmtDelta(d, invert){
  if (d==null) return {t:'—', c:MUTE};
  var good = invert ? d<0 : d>0;
  var t = (d>0?'+':'−') + Math.abs(d*100).toFixed(1) + '%';
  return {t:t, c: Math.abs(d)<0.001 ? MUTE : (good?POS:NEG)};
}
function dshort(d){ return d ? d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : ''; }
function uniq(rows, key){
  var seen = {}, out = [];
  rows.forEach(function(r){ var v = r[key]; if (v!=null && v!=='' && !seen[v]) { seen[v]=1; out.push(v); } });
  return out.sort();
}
function sumBy(rows, key){ var s=0; rows.forEach(function(r){ s += num(r[key]); }); return s; }
function groupSum(rows, dim, val){
  var m = {};
  rows.forEach(function(r){ var k = r[dim]||'—'; m[k] = (m[k]||0) + num(r[val]); });
  return m;
}
function normKeys(row){
  var o = {};
  Object.keys(row).forEach(function(k){ o[k.trim().toLowerCase()] = row[k]; });
  return o;
}

// SVG helpers
function sparkPts(series, w, h, pad){
  w=w||120; h=h||30; pad=pad||2;
  if (!series.length) return '';
  var max = Math.max.apply(null, series.concat([1])), min = Math.min.apply(null, series.concat([0]));
  var rng = (max-min)||1;
  return series.map(function(v,i){
    var x = series.length===1 ? w/2 : pad + i*(w-2*pad)/(series.length-1);
    var y = h-pad - (v-min)/rng*(h-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}
function linePath(series, w, h, max){
  if (!series.length) return '';
  max = max||Math.max.apply(null, series.concat([1]));
  return series.map(function(v,i){
    var x = series.length===1 ? w/2 : i*w/(series.length-1);
    var y = h-2 - (v/(max||1))*(h-14);
    return (i?'L':'M') + x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
}
function areaPath(series, w, h, max){
  if (!series.length) return '';
  var p = linePath(series, w, h, max);
  return p + ' L'+w+' '+h+' L0 '+h+' Z';
}

// ============================================================
// App
// ============================================================
var App = {
  data: null,           // {sales, products, channels, competitors, industry, actions, targets}
  weeks: [],            // sorted week timestamps present in sales
  F: {brand:'all', channel:'all', category:'all', collection:'all', geo:'all', period:'12'},
  tab: 'ov',
  brandCols: {},

  // ---------------- data loading ----------------
  load: function(isRefresh){
    var self = this;
    if (!APPS_SCRIPT_URL){
      document.getElementById('loading').style.display='none';
      var b = document.getElementById('banner');
      b.style.display='block';
      document.getElementById('bannerMsg').innerHTML =
        '<b>Not connected yet.</b> Deploy backend/Code.gs as a web app, then open this page as <span class="mono">index.html?api=YOUR_EXEC_URL</span> (remembered after the first visit).';
      return;
    }
    if (isRefresh){ document.getElementById('refreshBtn').innerHTML = '<span class="spin" style="border-top-color:#F3F2ED;border-color:rgba(243,242,237,.3)"></span>'; }
    fetch(APPS_SCRIPT_URL + (APPS_SCRIPT_URL.indexOf('?')>-1?'&':'?') + 'mode=all')
      .then(function(r){ return r.json(); })
      .then(function(payload){
        if (payload && payload.error) throw new Error(payload.error);
        self.ingest(payload);
        self.renderAll();
      })
      .catch(function(err){
        document.getElementById('loading').innerHTML = 'Could not load data: ' + esc(err.message) +
          '<div style="font-size:12px;color:var(--mute);margin-top:8px">Check the Apps Script deployment (access: Anyone) and the spreadsheet ID.</div>';
      })
      .finally(function(){ document.getElementById('refreshBtn').textContent = 'Refresh data'; });
  },

  ingest: function(payload){
    // Map the live sheet structure (REVENUE/INVENTORY/ALERTS with snake_case
    // headers) onto the dashboard's internal names. Legacy payload keys
    // (sales/products/actions) still work as fallbacks.
    var ALIASES = {
      sales:    {date:'week', brand_name:'brand', geography:'geo', units_sold:'units', revenue_amount:'revenue'},
      products: {brand_name:'brand', product_name:'product', item_name:'product', quantity_on_hand:'stock',
                 reorder_level:'reorderlevel', unit_cost:'cost', unit_price:'price', selling_price:'price', mrp:'price'},
      channels: {date:'week', brand_name:'brand', channel_name:'channel', clicks:'sessions', conversions:'orders',
                 cost:'adspend', ad_spend:'adspend', new_customers:'newcustomers', returning_customers:'returningcustomers'},
      actions:  {due_date:'due', action_required:'source'},
      costs:    {brand_name:'brand', cost_category:'category'},
      customers:{},
      competitors: {price_point:'pricepoint'},
      industry: {},
      targets:  {brand_name:'brand', revenue_target:'revenuetarget', units_target:'unitstarget',
                 new_customers_target:'newcustomerstarget'}
    };
    var take = function(keys){ for (var i=0;i<keys.length;i++){ if (payload[keys[i]] && payload[keys[i]].length) return payload[keys[i]]; } return []; };
    var raw = {
      sales: take(['revenue','sales']),
      products: take(['inventory','products']),
      channels: take(['channels']),
      customers: take(['customers']),
      costs: take(['costs']),
      actions: take(['alerts','actions']),
      competitors: take(['competitors']),
      industry: take(['industry']),
      targets: take(['targets']),
      brands: take(['brands'])
    };
    var d = {};
    Object.keys(raw).forEach(function(k){
      var al = ALIASES[k]||{};
      d[k] = raw[k].map(function(row){
        var r = normKeys(row);
        Object.keys(al).forEach(function(from){
          if (r[from]!=null && r[from]!=='' && (r[al[from]]==null || r[al[from]]==='')) r[al[from]] = r[from];
        });
        return r;
      });
    });
    d.products.forEach(function(r){ if (r.product==null||r.product==='') r.product = r.sku; });
    d.sales.forEach(function(r){ r._week = parseDate(r.week); });
    d.channels.forEach(function(r){ r._week = parseDate(r.week); });
    d.costs.forEach(function(r){ r._week = parseDate(r.date); });
    d.customers.forEach(function(r){ r._month = parseDate(r.cohort_month); });
    d.competitors.forEach(function(r){ r._date = parseDate(r.date); });
    d.industry.forEach(function(r){ r._date = parseDate(r.date); });
    this.data = d;

    var wk = {};
    d.sales.forEach(function(r){ if (r._week) wk[r._week.getTime()] = 1; });
    this.weeks = Object.keys(wk).map(Number).sort(function(a,b){return a-b;});

    // brand colors: known brands get validated chart colors, then the BRANDS
    // sheet's color_primary, then the fallback list in fixed order
    var sheetCols = {};
    d.brands.forEach(function(b){
      if (b.brand_name && b.color_primary) sheetCols[b.brand_name] = String(b.color_primary).trim();
    });
    var self = this, i = 0;
    this.brandCols = {};
    uniq(d.sales.concat(d.products, d.channels), 'brand').forEach(function(b){
      var meta = BRAND_META[String(b).toLowerCase()];
      if (meta) self.brandCols[b] = {col:meta.col, chart:meta.chart, wash:meta.wash, tag:meta.tag};
      else if (sheetCols[b]) self.brandCols[b] = {col:sheetCols[b], chart:sheetCols[b], wash:'#EFEDE6', tag:''};
      else self.brandCols[b] = {col:FALLBACK_BRAND_COLS[i%5], chart:FALLBACK_BRAND_COLS[i%5], wash:'#EFEDE6', tag:''};
      i++;
    });

    this.buildFilters();
    document.getElementById('loading').style.display='none';
    document.getElementById('screens').style.display='block';
  },

  buildFilters: function(){
    var d = this.data;
    var fill = function(id, label, values){
      var el = document.getElementById(id);
      el.innerHTML = '<option value="all">'+label+'</option>' +
        values.map(function(v){ return '<option value="'+esc(v)+'">'+esc(v)+'</option>'; }).join('');
    };
    fill('fBrand','Both brands', uniq(d.sales.concat(d.products), 'brand'));
    fill('fChannel','All channels', uniq(d.sales.concat(d.channels), 'channel'));
    fill('fCategory','All categories', uniq(d.sales.concat(d.products), 'category'));
    fill('fCollection','All collections', uniq(d.sales.concat(d.products), 'collection'));
    fill('fGeo','All geographies', uniq(d.sales, 'geo'));
  },

  setF: function(k, v){ this.F[k]=v; this.renderAll(); },
  resetF: function(){
    this.F = {brand:'all', channel:'all', category:'all', collection:'all', geo:'all', period:this.F.period};
    ['fBrand','fChannel','fCategory','fCollection','fGeo'].forEach(function(id){ document.getElementById(id).value='all'; });
    this.renderAll();
  },

  // ---------------- windows & filtering ----------------
  windows: function(){
    var n = this.F.period==='all' ? this.weeks.length : Math.min(+this.F.period, this.weeks.length);
    var cur = this.weeks.slice(this.weeks.length-n);
    var prev = this.weeks.slice(Math.max(0,this.weeks.length-2*n), this.weeks.length-n);
    return {cur:cur, prev:prev, n:n};
  },
  matches: function(r){
    var F = this.F;
    if (F.brand!=='all' && r.brand!==F.brand) return false;
    if (F.channel!=='all' && r.channel!==F.channel) return false;
    if (F.category!=='all' && r.category!==F.category) return false;
    if (F.collection!=='all' && r.collection!==F.collection) return false;
    if (F.geo!=='all' && r.geo!==F.geo) return false;
    return true;
  },
  salesIn: function(weekList, ignoreDims){
    var self=this, set={};
    weekList.forEach(function(t){set[t]=1;});
    return this.data.sales.filter(function(r){
      if (!r._week || !set[r._week.getTime()]) return false;
      return ignoreDims ? true : self.matches(r);
    });
  },
  channelsIn: function(weekList){
    var self=this, set={};
    weekList.forEach(function(t){set[t]=1;});
    return this.data.channels.filter(function(r){
      if (!r._week || !set[r._week.getTime()]) return false;
      if (self.F.brand!=='all' && r.brand!==self.F.brand) return false;
      if (self.F.channel!=='all' && r.channel!==self.F.channel) return false;
      return true;
    });
  },
  weeklySeries: function(rows, valKey, weekList){
    var by = {};
    rows.forEach(function(r){ var t=r._week.getTime(); by[t]=(by[t]||0)+num(r[valKey]); });
    return weekList.map(function(t){ return by[t]||0; });
  },

  // margin% lookup per brand+category from Products (estimated)
  marginFor: function(brand, category){
    var rows = this.data.products.filter(function(p){
      return (!brand || p.brand===brand) && (!category || p.category===category) && num(p.price)>0;
    });
    if (!rows.length) rows = this.data.products.filter(function(p){ return num(p.price)>0; });
    if (!rows.length) return 0.55;
    var s=0; rows.forEach(function(p){ s += 1 - num(p.cost)/num(p.price); });
    return Math.max(0, Math.min(0.9, s/rows.length));
  },

  // ---------------- rendering ----------------
  renderAll: function(){
    if (!this.data) return;
    var W = this.windows();
    var cur = this.salesIn(W.cur), prev = this.salesIn(W.prev);
    var showReset = ['brand','channel','category','collection','geo'].some(function(k){ return App.F[k]!=='all'; });
    document.getElementById('resetBtn').style.display = showReset ? '' : 'none';

    var a = W.cur.length ? new Date(W.cur[0]) : null, b = W.cur.length ? new Date(W.cur[W.cur.length-1]) : null;
    document.getElementById('windowLabel').textContent = W.cur.length
      ? (this.F.period==='all'?'All time':'Last '+W.n+' weeks') + ' · ' + dshort(a) + ' – ' + dshort(b) : 'No data yet';
    document.getElementById('appDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'long',year:'numeric'});

    this.alerts = this.buildAlerts(cur, prev, W);
    this.renderTabs();
    this.renderOverview(cur, prev, W);
    this.renderBrands(cur, prev, W);
    this.renderProduct(cur, prev, W);
    this.renderCustomer(W);
    this.renderCompetition(W);
    this.renderIndustry(W);
  },

  renderTabs: function(){
    var self=this;
    var alertCount = (this.alerts||[]).length;
    document.getElementById('tabs').innerHTML = TABS.map(function(t){
      var badge = (t.id==='ov' && alertCount) ? '<span class="badge">'+alertCount+'</span>' : '';
      return '<button class="tabbtn'+(self.tab===t.id?' on':'')+'" onclick="App.go(\''+t.id+'\')">'+t.t+badge+'</button>';
    }).join('');
  },
  go: function(id){
    this.tab = id;
    TABS.forEach(function(t){ document.getElementById('scr-'+t.id).style.display = t.id===id?'':'none'; });
    this.renderTabs();
    window.scrollTo({top:0, behavior:'smooth'});
  },

  // ---------------- alerts ----------------
  buildAlerts: function(cur, prev, W){
    var alerts = [], self=this;
    // channel drops
    var chCur = groupSum(cur,'channel','revenue'), chPrev = groupSum(prev,'channel','revenue');
    Object.keys(chCur).forEach(function(ch){
      var d = deltaPct(chCur[ch], chPrev[ch]||0);
      if (d!=null && d < -0.2 && (chPrev[ch]||0) > 0)
        alerts.push({sev:'neg', title: ch+' revenue down '+Math.abs(d*100).toFixed(0)+'%',
          detail:'From '+fmtMoney(chPrev[ch])+' to '+fmtMoney(chCur[ch])+' vs the prior window.', meta:'Channel · revenue'});
    });
    // return-rate spike
    var units = sumBy(cur,'units'), rets = sumBy(cur,'returns');
    var uPrev = sumBy(prev,'units'), rPrev = sumBy(prev,'returns');
    if (units>0 && rets/units > 0.08 && (uPrev===0 || rets/units > (rPrev/uPrev)*1.25))
      alerts.push({sev:'neg', title:'Return rate at '+fmtPct(rets/units),
        detail:'Returns are '+Math.round(rets)+' of '+Math.round(units)+' units this window.', meta:'Quality · returns'});
    // stock
    this.data.products.forEach(function(p){
      var st = String(p.status||'').toLowerCase();
      if (st==='discontinued') return;
      if (self.F.brand!=='all' && p.brand!==self.F.brand) return;
      if (num(p.stock)<=0 || st==='out of stock')
        alerts.push({sev:'neg', title:'Out of stock: '+p.product, detail:(p.brand||'')+' · '+(p.category||'')+' · price '+fmtMoney(num(p.price)), meta:'Inventory'});
      else if (num(p.reorderlevel)>0 && num(p.stock)<=num(p.reorderlevel))
        alerts.push({sev:'amber', title:'Low stock: '+p.product, detail:(p.stock)+' left · reorder at '+p.reorderlevel+' · '+(p.brand||''), meta:'Inventory'});
    });
    // target pace
    var tgt = this.data.targets, now = new Date();
    var mKey = now.toISOString().slice(0,7);
    var mSales = this.data.sales.filter(function(r){ return r._week && r._week.toISOString().slice(0,7)===mKey && self.matches(r); });
    var mRev = sumBy(mSales,'revenue');
    var tRows = tgt.filter(function(t){
      var d = parseDate(t.month);
      if (!d || d.toISOString().slice(0,7)!==mKey) return false;
      return self.F.brand==='all' || t.brand===self.F.brand;
    });
    var tSum = sumBy(tRows,'revenuetarget');
    if (tSum>0){
      var dim = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      var pace = tSum * (now.getDate()/dim);
      if (mRev < pace*0.9)
        alerts.push({sev:'amber', title:'Behind monthly target pace', detail: fmtMoney(mRev)+' so far vs '+fmtMoney(pace)+' expected by today ('+fmtMoney(tSum)+' target).', meta:'Plan · '+mKey});
    }
    return alerts.slice(0, 8);
  },

  // ============================================================
  // SCREEN 01 · Executive Overview
  // ============================================================
  renderOverview: function(cur, prev, W){
    var el = document.getElementById('scr-ov');
    if (!cur.length){
      el.innerHTML = '<div class="empty"><b>No sales rows in this window.</b> Add rows to the <span class="mono">REVENUE</span> tab — one per week × brand × channel × category × collection × geo — and hit Refresh data.</div>';
      return;
    }
    var self = this;
    var rev = sumBy(cur,'revenue'), revP = sumBy(prev,'revenue');
    var units = sumBy(cur,'units'), unitsP = sumBy(prev,'units');
    var disc = sumBy(cur,'discount'), discP = sumBy(prev,'discount');
    var rets = sumBy(cur,'returns'), retsP = sumBy(prev,'returns');
    var ch = this.channelsIn(W.cur), chP = this.channelsIn(W.prev);
    var orders = sumBy(ch,'orders'), ordersP = sumBy(chP,'orders');
    var newC = sumBy(ch,'newcustomers'), newCP = sumBy(chP,'newcustomers');
    var retC = sumBy(ch,'returningcustomers'), retCP = sumBy(chP,'returningcustomers');
    var spend = sumBy(ch,'adspend'), spendP = sumBy(chP,'adspend');
    var aov = orders? rev/orders : 0, aovP = ordersP? revP/ordersP : 0;

    // movers
    var movers = [];
    ['channel','category','collection','geo'].forEach(function(dim){
      var c = groupSum(cur, dim, 'revenue'), p = groupSum(prev, dim, 'revenue');
      Object.keys(c).forEach(function(k){
        if (k==='—') return;
        var d = (c[k]||0)-(p[k]||0);
        if (p[k]>0 || c[k]>0) movers.push({t:k+' <span style="color:var(--mute);font-weight:400">('+dim+')</span>', abs:d, pct: deltaPct(c[k], p[k]||0)});
      });
    });
    movers.sort(function(a,b){ return Math.abs(b.abs)-Math.abs(a.abs); });
    var ups = movers.filter(function(m){return m.abs>0;}).slice(0,4);
    var dns = movers.filter(function(m){return m.abs<0;}).slice(0,4);

    // verdict
    var dRev = fmtDelta(deltaPct(rev, revP));
    var verdict, vsub;
    var topUp = ups[0], topDn = dns[0];
    if (deltaPct(rev,revP)==null){ verdict = fmtMoney(rev)+' this window.'; vsub='Add more weeks of data to unlock comparisons against the prior period.'; }
    else if (rev>=revP){ verdict = 'Revenue is up '+dRev.t.replace('+','')+' — '+(topUp? topUp.t.replace(/<[^>]*>/g,'')+' is doing the pulling.' : 'broad-based.'); vsub = topDn ? 'Watch the other side: '+topDn.t.replace(/<[^>]*>/g,'')+' gave back '+fmtMoney(Math.abs(topDn.abs))+'.' : 'No meaningful declines underneath.'; }
    else { verdict = 'Revenue is down '+dRev.t.replace('−','')+' vs the prior window.'; vsub = topDn ? 'Biggest leak: '+topDn.t.replace(/<[^>]*>/g,'')+' ('+fmtMoney(topDn.abs)+').'+(topUp?' Bright spot: '+topUp.t.replace(/<[^>]*>/g,'')+'.':'') : ''; }

    // brand pulse
    var pulse = uniq(cur,'brand').map(function(b){
      var bc = cur.filter(function(r){return r.brand===b;}), bp = prev.filter(function(r){return r.brand===b;});
      var series = self.weeklySeries(bc, 'revenue', W.cur);
      var d = fmtDelta(deltaPct(sumBy(bc,'revenue'), sumBy(bp,'revenue')));
      var meta = self.brandCols[b]||{col:INK,tag:''};
      return '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
        +'<span style="width:10px;height:10px;border-radius:50%;background:'+meta.col+';flex:none"></span>'
        +'<div style="min-width:140px"><div style="font-weight:600;font-size:13.5px">'+esc(b)+'</div><div style="font-size:11px;color:var(--mute)">'+esc(meta.tag||'')+'</div></div>'
        +'<div style="font-family:var(--serif);font-size:20px;min-width:88px">'+fmtMoney(sumBy(bc,'revenue'))+'</div>'
        +'<span class="delta" style="color:'+d.c+'">'+d.t+'</span>'
        +'<svg viewBox="0 0 120 30" preserveAspectRatio="none" style="width:96px;height:26px;margin-left:auto"><polyline points="'+sparkPts(series)+'" fill="none" stroke="'+meta.col+'" stroke-width="1.6"/></svg>'
        +'</div>';
    }).join('');

    // KPI cards
    var mk = function(l, val, d, series, sub, invert){
      var dd = fmtDelta(d, invert);
      var pts = sparkPts(series);
      var last = pts ? pts.split(' ').pop().split(',') : null;
      return '<div class="kpi">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span class="l">'+l+'</span><span class="delta" style="color:'+dd.c+'">'+dd.t+'</span></div>'
        +'<div class="v">'+val+'</div>'
        +'<svg viewBox="0 0 120 30" preserveAspectRatio="none" style="width:100%;height:28px"><polyline points="'+pts+'" fill="none" stroke="#C9C4B6" stroke-width="1.4"/>'
        +(last?'<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.4" fill="#1B1A17"/>':'')+'</svg>'
        +'<div class="s">'+sub+'</div></div>';
    };
    var revSeries = this.weeklySeries(cur,'revenue',W.cur);
    var unitSeries = this.weeklySeries(cur,'units',W.cur);
    var chSeries = function(key){ return W.cur.map(function(t){ var s=0; ch.forEach(function(r){ if(r._week.getTime()===t) s+=num(r[key]); }); return s; }); };
    var retSeries = W.cur.map(function(t,i){ var u=unitSeries[i]; var rr=0; cur.forEach(function(r){ if(r._week.getTime()===t) rr+=num(r.returns); }); return u? rr/u*100 : 0; });
    var kpis = [
      mk('Revenue', fmtMoney(rev), deltaPct(rev,revP), revSeries, 'vs '+fmtMoney(revP)+' prior'),
      mk('Units sold', fmtNum(units), deltaPct(units,unitsP), unitSeries, 'across all rows in window'),
      mk('Orders', orders?fmtNum(orders):'—', deltaPct(orders,ordersP), chSeries('orders'), orders?'from CHANNELS tab':'add CHANNELS rows'),
      mk('Avg order value', aov?fmtMoney(aov):'—', deltaPct(aov,aovP), [], 'revenue ÷ orders'),
      mk('Discount given', fmtMoney(disc), deltaPct(disc,discP), [], rev? fmtPct(disc/(rev+disc))+' of gross' : '', true),
      mk('Return rate', units?fmtPct(rets/units):'—', deltaPct(units?rets/units:0, unitsP?retsP/unitsP:0), retSeries, Math.round(rets)+' units back', true),
      mk('New customers', newC?fmtNum(newC):'—', deltaPct(newC,newCP), chSeries('newcustomers'), newC?'from CHANNELS tab':'add CHANNELS rows'),
      mk('Ad spend', spend?fmtMoney(spend):'—', deltaPct(spend,spendP), [], spend&&rev? 'ROAS '+(rev/spend).toFixed(1)+'×':'', true)
    ].join('');

    // revenue rhythm (per brand lines)
    var brands = uniq(this.data.sales,'brand');
    var rhythmW = this.F.period==='all' ? this.weeks : this.weeks.slice(-24);
    var brandSeries = brands.map(function(b){
      var rows = self.salesIn(rhythmW, true).filter(function(r){
        if (r.brand!==b) return false;
        var F=self.F;
        if (F.channel!=='all'&&r.channel!==F.channel) return false;
        if (F.category!=='all'&&r.category!==F.category) return false;
        if (F.collection!=='all'&&r.collection!==F.collection) return false;
        if (F.geo!=='all'&&r.geo!==F.geo) return false;
        return true;
      });
      return {b:b, s:self.weeklySeries(rows,'revenue',rhythmW)};
    });
    var maxV = 1;
    brandSeries.forEach(function(bs){ bs.s.forEach(function(v){ if(v>maxV) maxV=v; }); });
    var paths = brandSeries.map(function(bs){
      var meta = self.brandCols[bs.b]||{chart:INK};
      return '<path d="'+areaPath(bs.s,800,240,maxV)+'" fill="'+meta.chart+'12"/>'
           + '<path d="'+linePath(bs.s,800,240,maxV)+'" fill="none" stroke="'+meta.chart+'" stroke-width="2"/>';
    }).join('');
    var legend = brandSeries.map(function(bs){
      var meta = self.brandCols[bs.b]||{chart:INK};
      return '<span style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--soft)"><span style="width:9px;height:9px;border-radius:50%;background:'+meta.chart+'"></span>'+esc(bs.b)+'</span>';
    }).join('');
    var xl = rhythmW.filter(function(_,i){ return i % Math.max(1,Math.floor(rhythmW.length/6))===0; })
      .map(function(t){ return '<span>'+dshort(new Date(t))+'</span>'; }).join('');
    var peak = 0; brandSeries.forEach(function(bs){ bs.s.forEach(function(v,i){ if(v>peak) peak=v; }); });

    // alerts html
    var alertsHtml = (this.alerts||[]).map(function(a){
      var dot = a.sev==='neg'?NEG:AMBER;
      return '<div style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--linesoft)">'
        +'<span style="width:8px;height:8px;border-radius:50%;background:'+dot+';margin-top:5px;flex:none"></span>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(a.title)+'</div>'
        +'<div style="font-size:12px;color:var(--soft);margin-top:2px;line-height:1.45">'+esc(a.detail)+'</div>'
        +'<div style="display:flex;gap:8px;margin-top:7px;align-items:center;flex-wrap:wrap">'
        +'<span class="mono" style="font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute)">'+esc(a.meta)+'</span>'
        +'<button class="btn" onclick="App.addAction(\''+esc(a.title).replace(/'/g,"\\'")+'\')">Make it an action</button>'
        +'</div></div></div>';
    }).join('') || '<div style="font-size:12.5px;color:var(--soft);padding:12px 0">Nothing flagged in this window. Keep the data flowing.</div>';

    // action board
    var boardHtml = this.renderBoard();

    // chips
    var chips = [
      {n: fmtMoney(rev), l:'revenue'},
      {n: orders?fmtNum(orders):fmtNum(units), l: orders?'orders':'units'},
      {n: (this.alerts||[]).length, l:'flags'}
    ].map(function(c){ return '<div style="border:1px solid var(--line);border-radius:8px;padding:8px 12px;display:flex;align-items:baseline;gap:8px;background:var(--cardsoft)"><span style="font-family:var(--serif);font-size:20px">'+c.n+'</span><span class="mono" style="font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute)">'+c.l+'</span></div>'; }).join('');

    el.innerHTML =
      '<div class="card" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:26px;padding:24px 26px;animation:fadeUp 0.4s ease both">'
      +'<div><div class="kicker">The read · '+document.getElementById('windowLabel').textContent+'</div>'
      +'<div style="font-family:var(--serif);font-size:27px;line-height:1.25;margin-top:8px;max-width:580px">'+esc(verdict)+'</div>'
      +'<div style="font-size:13.5px;color:var(--soft);margin-top:10px;max-width:620px;line-height:1.55">'+esc(vsub)+'</div>'
      +'<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">'+chips+'</div></div>'
      +'<div style="border-left:1px solid var(--hairline);padding-left:26px;display:flex;flex-direction:column;gap:13px;justify-content:center"><div class="kicker">Brand pulse</div>'+pulse+'</div>'
      +'</div>'

      +'<div class="grid gk">'+kpis+'</div>'

      +'<div class="card" style="margin-top:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px">'
      +'<div><h3>Revenue rhythm</h3><div class="sub">'+(rhythmW.length)+' weeks · honours channel, category, collection &amp; geo filters</div></div>'
      +'<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">'+legend+'</div></div>'
      +'<div style="position:relative;margin-top:14px" id="rhythmWrap">'
      +'<svg id="rhythmSvg" viewBox="0 0 800 240" preserveAspectRatio="none" style="width:100%;height:230px;display:block">'
      +'<line x1="0" y1="60" x2="800" y2="60" stroke="#F1EFE8"/><line x1="0" y1="120" x2="800" y2="120" stroke="#F1EFE8"/><line x1="0" y1="180" x2="800" y2="180" stroke="#F1EFE8"/><line x1="0" y1="239" x2="800" y2="239" stroke="#E6E3DA"/>'
      +paths
      +'<line id="rhythmCross" x1="0" x2="0" y1="0" y2="240" stroke="#1B1A17" stroke-width="1" stroke-dasharray="3,3" style="display:none"/>'
      +'</svg>'
      +'<div class="mono" style="position:absolute;top:4px;left:8px;font-size:10px;color:var(--mute)">peak week '+fmtMoney(peak)+'</div></div>'
      +'<div class="mono" style="display:flex;justify-content:space-between;font-size:10px;color:var(--mute);margin-top:6px">'+xl+'</div>'
      +'</div>'

      +'<div class="grid g2">'
      +'<div class="card"><h3>What changed</h3><div class="sub">Biggest revenue swings vs the prior window, across channel · category · collection · geo</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:12px">'
      +'<div><div class="mono" style="font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:'+POS+';font-weight:600">Moving up</div>'
      +(ups.map(function(m){ return '<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--linesoft);align-items:baseline"><span style="font-size:12.5px;font-weight:500;line-height:1.35">'+m.t+'</span><span class="delta" style="color:'+POS+'">+'+fmtMoney(m.abs).replace('₹','₹')+'</span></div>'; }).join('')||'<div style="font-size:12px;color:var(--mute);padding:8px 0">—</div>')+'</div>'
      +'<div><div class="mono" style="font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:'+NEG+';font-weight:600">Moving down</div>'
      +(dns.map(function(m){ return '<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--linesoft);align-items:baseline"><span style="font-size:12.5px;font-weight:500;line-height:1.35">'+m.t+'</span><span class="delta" style="color:'+NEG+'">−'+fmtMoney(Math.abs(m.abs)).replace('₹','₹')+'</span></div>'; }).join('')||'<div style="font-size:12px;color:var(--mute);padding:8px 0">—</div>')+'</div>'
      +'</div></div>'
      +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap"><h3>Needs attention</h3><span class="mono" style="font-size:10px;color:var(--mute)">computed from your sheets</span></div>'+alertsHtml+'</div>'
      +'</div>'

      +'<div class="card" style="margin-top:14px"><h3>Action board</h3>'
      +'<div class="sub">Every alert can become an action. This board is the Monday meeting — it reads and writes the <span class="mono">ALERTS</span> tab.</div>'
      + boardHtml
      +'</div>';

    this.wireRhythmHover(brandSeries, rhythmW, maxV);
  },

  wireRhythmHover: function(brandSeries, weekList, maxV){
    var svg = document.getElementById('rhythmSvg'), cross = document.getElementById('rhythmCross');
    var tt = document.getElementById('tt'), self = this;
    if (!svg || !weekList.length) return;
    svg.addEventListener('mousemove', function(ev){
      var rect = svg.getBoundingClientRect();
      var fx = (ev.clientX-rect.left)/rect.width;
      var i = Math.round(fx*(weekList.length-1));
      i = Math.max(0, Math.min(weekList.length-1, i));
      var x = weekList.length===1 ? 400 : i*800/(weekList.length-1);
      cross.setAttribute('x1',x); cross.setAttribute('x2',x); cross.style.display='';
      var lines = brandSeries.map(function(bs){
        var meta = self.brandCols[bs.b]||{chart:INK};
        return '<div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:'+meta.chart+'"></span>'+esc(bs.b)+' &nbsp;<b>'+fmtMoney(bs.s[i]||0)+'</b></div>';
      }).join('');
      tt.innerHTML = '<div class="mono">'+dshort(new Date(weekList[i]))+'</div>'+lines;
      tt.style.display='block';
      tt.style.left = Math.min(window.innerWidth-280, ev.clientX+14)+'px';
      tt.style.top = (ev.clientY+14)+'px';
    });
    svg.addEventListener('mouseleave', function(){ cross.style.display='none'; tt.style.display='none'; });
  },

  // ---------------- action board ----------------
  renderBoard: function(){
    var groups = {'to do':[], 'in progress':[], 'done':[]};
    (this.data.actions||[]).forEach(function(a, i){
      a._idx = i;
      var st = String(a.status||'To do').toLowerCase();
      (groups[st] || groups['to do']).push(a);
    });
    var colHtml = Object.keys(groups).map(function(st){
      var cards = groups[st].map(function(a){
        var next = st==='to do' ? 'In progress' : st==='in progress' ? 'Done' : null;
        return '<div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:8px">'
          +'<div style="font-size:12.5px;font-weight:600;line-height:1.4">'+esc(a.title)+'</div>'
          +'<div style="display:flex;gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">'
