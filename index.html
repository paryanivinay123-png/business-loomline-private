(function(){
"use strict";
// ============================================================
// Business Loomline — Business Math dashboard (live data)
// Ported from the "Balooo Business Math" prototype and wired to the
// Google Sheet via the Apps Script web app (backend/Code.gs).
// Data structure: docs/business-math-data-model.md
// ============================================================
var h = React.createElement;

// --- screen groups for the two-tier navigation ---
var GROUPS = [
  {id:'business',  t:'Business',            tabs:['math','pnl','costs','planner','yoy']},
  {id:'product',   t:'Product & inventory', tabs:['product','inventory']},
  {id:'marketing', t:'Marketing',           tabs:['sales']},
  {id:'actions',   t:'Actions',             tabs:['actions']}
];

// --- API endpoint (baked in; override once with ?api=YOUR_EXEC_URL) ---
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuhPsBocseqnAJCfw2dweLfNcD7OzIzwXtDLLw224FtmB2Usy93zwI4PIzDgctkMhoaA/exec';
(function(){
  var q = new URLSearchParams(location.search).get('api');
  if (q) { localStorage.setItem('balooo_api', q); history.replaceState(null,'',location.pathname); }
  if (!APPS_SCRIPT_URL) APPS_SCRIPT_URL = localStorage.getItem('balooo_api') || '';
})();

// --- parsing / formatting helpers ---
function num(v){ if(v==null||v==='') return 0; if(typeof v==='number') return v;
  var n = parseFloat(String(v).replace(/[₹,%\s]/g,'')); return isNaN(n)?0:n; }
function present(v){ return !(v==null||v===''); }
function parseAny(v){
  if(v==null||v==='') return null;
  if(v instanceof Date) return v;
  if(typeof v==='number' && v>10000 && v<80000) return new Date(Date.UTC(1899,11,30) + v*86400000); // Excel serial
  var d = new Date(v); if(!isNaN(d)) return d;
  var m = String(v).match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/); // dd/mm/yyyy
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  return null;
}
function fmtDate(d){ return d ? d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : ''; }
function normKeys(row){ var o={}; Object.keys(row).forEach(function(k){ o[String(k).trim().toLowerCase()] = row[k]; }); return o; }

// --- map the live sheet payload onto the shapes the component computes on ---
function mapPayload(p){
  p = p || {};
  function take(){ for(var i=0;i<arguments.length;i++){ var k=arguments[i]; if(p[k] && p[k].length) return p[k]; } return []; }
  var FALL = ['#A13E63','#2F6D77','#B7791F','#557426','#6B5CA5'];

  var brandsMeta = {};
  take('brands').forEach(function(row,i){ var r=normKeys(row); var id=String(r.brand_id||'').trim();
    if(id) brandsMeta[id] = {name:r.brand_name||id, col:r.color_primary||FALL[i%5], tag:r.tag||''}; });
  function ensureBrand(id){ if(id && id!=='Shared' && !brandsMeta[id])
    brandsMeta[id] = {name:id, col:FALL[Object.keys(brandsMeta).length%5], tag:''}; }

  var revenue = take('revenue','sales').map(function(row){ var r=normKeys(row); var d=parseAny(r.date);
    var gross=num(r.revenue), retV=num(r.returns_value);
    return {_d:d, date:d?fmtDate(d):(r.date||''), brand:String(r.brand_id||'').trim(),
      channel:r.channel||'Retail', category:r.category||'', collection:r.collection||'—',
      geo:r.geography||r.geo||'', revenue:gross-retV, gross:gross, units:num(r.units_sold||r.units),
      returnsUnits:num(r.returns_units), sku:r.sku||'', customerId:r.customer_id||'', discount:num(r.discount_amount)}; });
  revenue.forEach(function(r){ ensureBrand(r.brand); });

  var costs = take('costs').map(function(row){ var r=normKeys(row);
    return {_d:parseAny(r.date), brand:String(r.brand_id||'').trim(), func:String(r.cost_function||'').trim(),
      stage:String(r.cost_stage||'').trim(), dept:String(r.department||'').trim(),
      item:r.line_item||r.cost_category||'', amt:num(r.amount),
      gstAmt: present(r.gst_amount)?num(r.gst_amount):null, sku:r.sku||'', vendor:r.vendor||''}; })
    .filter(function(c){ return c.amt>0 || c.item; });

  var inventory = take('inventory','products').map(function(row){ var r=normKeys(row);
    return {sku:r.sku||'', brand:String(r.brand_id||'').trim(), name:r.product_name||r.sku||'',
      category:r.category||'', collection:r.collection||'', fabric:String(r.fabric||'').trim(),
      cost: present(r.unit_cost)?num(r.unit_cost):null, price:num(r.unit_price||r.price),
      qty: present(r.quantity_on_hand)?num(r.quantity_on_hand):1, reorder:num(r.reorder_level),
      warehouse:r.warehouse||'', status:r.status||'Active', silhouette:String(r.silhouette||'').trim(),
      proportion:String(r.proportion||'').trim(), technique:String(r.technique||'').trim(), colour:String(r.colour||'').trim()}; })
    .filter(function(pp){ return pp.price>0 || pp.name; });
  inventory.forEach(function(p){ ensureBrand(p.brand); });

  var channels = take('channels').map(function(row){ var r=normKeys(row);
    return {_d:parseAny(r.date), channel:String(r.channel_name||'').trim(), impressions:num(r.impressions),
      clicks:num(r.clicks), conversions:num(r.conversions), cost:num(r.cost)}; })
    .filter(function(c){ return c.channel; });

  var customers = take('customers').map(function(row){ var r=normKeys(row);
    return {id:r.customer_id||'', brand:String(r.brand_id||'').trim(), first:parseAny(r.first_order_date||r.cohort_month),
      city:r.city||'', age:String(r.age_band||'').trim(), gender:String(r.gender||'').trim(),
      acqChannel:r.acquisition_channel||'', acqCost:num(r.acquisition_cost)}; })
    .filter(function(c){ return c.id || c.first; });

  var alerts = take('alerts','actions').map(function(row){ var r=normKeys(row);
    return {id:r.id||'', title:r.title||'', owner:r.owner||'', status:r.status||'To do',
      note:r.action_required||r.note||'', due:r.due_date||r.due||''}; })
    .filter(function(a){ return a.title; });

  var targets = take('targets').map(function(row){ var r=normKeys(row);
    return {_m:parseAny(r.month), brand:String(r.brand_id||'').trim(), revTarget:num(r.revenue_target),
      unitsTarget:num(r.units_target), newCustTarget:num(r.new_customers_target)}; });

  var brandList=[['all','Both brands']];
  Object.keys(brandsMeta).forEach(function(id){ brandList.push([id, brandsMeta[id].name]); });

  return {revenue:revenue, costs:costs, inventory:inventory, channels:channels,
    customers:customers, alerts:alerts, targets:targets, brandsMeta:brandsMeta, brandList:brandList};
}

class Dashboard extends React.Component {


  state = { tab: 'math', brand: 'all', moves: {}, adds: [],
    sc: null, growth: 60, reinvest: 40, pnlGroup: 'schedule', pnlOpen: {}, costOpen: {},
    data: null, loading: true, error: null };

  // ---- hierarchical cost taxonomy: Function > Sub-group > line item ----
  costNode(c){ var i=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){
      if(/website|hostinger|elementor/.test(i)) return {l1:'Marketing & brand', l2:'Digital infrastructure'};
      return {l1:'Marketing & brand', l2:'Campaign & content'};
    }
    if(d==='Legal') return {l1:'Overheads', l2:'Legal & IP'};
    // everything else is Product; split experiment vs final
    var exp = d==='Art Experiment' || /sample|experiment|linocut|cutout|recce|\bv2\b/.test(i);
    return {l1:'Product', l2: exp?'Silhouette & R&D experiments':'Final production'};
  }
  costTree(){ var self=this, m={};
    this.costs.forEach(function(c){ var n=self.costNode(c);
      if(!m[n.l1]) m[n.l1]={key:n.l1, amount:0, subs:{}};
      m[n.l1].amount+=c.amt;
      if(!m[n.l1].subs[n.l2]) m[n.l1].subs[n.l2]={key:n.l2, amount:0, items:[]};
      m[n.l1].subs[n.l2].amount+=c.amt;
      m[n.l1].subs[n.l2].items.push({label:c.item, amt:c.amt, dept:c.dept});
    });
    return Object.keys(m).map(function(k){ var g=m[k];
      g.subList=Object.keys(g.subs).map(function(s){ var sb=g.subs[s]; sb.items.sort(function(a,z){return z.amt-a.amt;}); return sb; }).sort(function(a,z){return z.amount-a.amount;});
      return g; }).sort(function(a,z){return z.amount-a.amount;});
  }
  toggleCost(k){ var o=Object.assign({}, this.state.costOpen); o[k]=!o[k]; this.setState({costOpen:o}); }

  // ---- tax model: split each procurement/service into input cost + GST paid (recoverable ITC) ----
  // Amounts in the sheet are treated as GST-inclusive; add explicit base_amount / gst columns to make this exact.
  gstRate(c){ var d=c.dept;
    if(d==='Marketing'||d==='Legal') return 0.18;          // services
    if(d==='Fabric'||d==='Paints'||d==='Articles') return 0.05; // textiles & materials
    return 0.05;                                            // print, stitching, job work
  }
  costSplit(c){ var r=this.gstRate(c); var base=c.amt/(1+r); return {gross:c.amt, base:base, tax:c.amt-base, rate:r}; }
  taxTotals(list){ var self=this; list=list||this.costs; var g=0,b=0,t=0;
    list.forEach(function(c){ var s=self.costSplit(c); g+=s.gross; b+=s.base; t+=s.tax; });
    return {gross:g, base:b, tax:t}; }

  // ---- palette ----
  C = { paper:'#F3F2ED', card:'#FFFFFF', soft:'#5D594F', mute:'#9B9587', ink:'#1B1A17',
        line:'#E6E3DA', linesoft:'#F1EFE8', hair:'#EEEBE3', dark:'#161511',
        hb:'#A13E63', ps:'#2F6D77', pos:'#2E7D4F', neg:'#C1442E', amber:'#B7791F',
        serif:"'Instrument Serif',Georgia,serif", mono:"'Spline Sans Mono',ui-monospace,monospace" };
  DCOL = ['#A13E63','#B7791F','#0B7EA8','#557426','#6B5CA5','#2F6D77','#C1442E','#8A6D3B'];

  // ======= REAL DATA (from Business Loomline.xlsx) =======

           {id:'product', t:'04 · What we\u2019ve made'}, {id:'sales', t:'05 · Sales & channels'},
           {id:'inventory', t:'06 · Inventory'}, {id:'yoy', t:'07 · YoY overview'}, {id:'actions', t:'08 · Actions & alerts'},
           {id:'planner', t:'09 · Scenario planner'} ];

  // ---- fabric assignment (sheet has no per-SKU fabric column; mapped from category + the fabrics you actually bought) ----
  invFabric(p){ var c=p.category, n=(p.name||'').toLowerCase();
    if(/hand paint/.test(n) || c==='Hand-painted Jacket') return {name:'Hand-painted (Chindhi base)', col:'#8A6D3B'};
    if(c==='Accessory') return {name:'Chindhi / offcuts', col:'#B7791F'};
    if(c==='Crop Shirt') return {name:'Egyptian Cotton', col:'#0B7EA8'};
    if(c==='Long Shirt') return {name:'Linen (Jaipur)', col:'#557426'};

  }

  // ---- cost taxonomy: classify every cost line into a business bucket ----
  costClass(c){
    var i=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){
      if(/website|hostinger|elementor/.test(i)) return {bucket:'infra', kind:'One-time capex', label:'Digital infrastructure'};

  }
  taxonomy(){ var self=this; var b={cogs:0, growth:0, infra:0};
    this.costs.forEach(function(c){ b[self.costClass(c).bucket]+=c.amt; });
    var piecesMade = this.inventory.length + this.revenue.reduce(function(a,r){return a+r.units;},0);
    return { cogs:b.cogs, growth:b.growth, infra:b.infra, total:b.cogs+b.growth+b.infra,

             varUnit:Math.round(t.varPerUnit), marketing:15000, horizon:12 };
  }

  // ================= 03 · WHERE MONEY WENT (hierarchical) =================

      self.stat('\u2014 Final production', self.money(fin), 'goods for sale', self.DCOL[5]),
      self.stat('Marketing & brand', self.money(marketing), self.pct(marketing/total)+' of spend', self.DCOL[0]));

    // experiment vs final production bar (the split the user cares about)

        h('div',{style:{width:(exp/prodTot*100).toFixed(1)+'%',background:self.DCOL[3],display:'flex',alignItems:'center',paddingLeft:'12px',color:'#fff',fontSize:'12px',fontWeight:600,minWidth:0}}, 'R&D '+self.pct(exp/prodTot)),
        h('div',{style:{width:(fin/prodTot*100).toFixed(1)+'%',background:self.DCOL[5],display:'flex',alignItems:'center',paddingLeft:'12px',color:'#fff',fontSize:'12px',fontWeight:600,minWidth:0}}, 'Final '+self.pct(fin/prodTot))),

    ], {marginTop:'14px'});

  // ================= 04 · WHAT WE'VE MADE (product insights) =================
  // --- attribute derivation: breaks each SKU down from its name + category ---
  prodSilhouette(p){ var c=p.category;
    if(c==='Accessory') return 'Accessory';
    if(c==='Jacket'||c==='Hand-painted Jacket') return 'Jacket / outerwear';
    if(c==='Crop Shirt') return 'Crop top';
    if(c==='Long Shirt') return 'Longline shirt';
    return 'Shirt'; }
  prodProportion(p){ var c=p.category;
    if(c==='Crop Shirt') return 'Cropped';
    if(c==='Long Shirt') return 'Longline';
    if(c==='Jacket'||c==='Hand-painted Jacket') return 'Outerwear';
    if(c==='Accessory') return 'Accessory';
    return 'Regular'; }
  prodTechnique(p){ var n=(p.name||'').toLowerCase();
    if(/hand paint/.test(n)||p.category==='Hand-painted Jacket') return 'Hand-painted';
    if(/plain/.test(n)) return 'Plain / solid';
    if(/checker/.test(n)) return 'Woven check';
    if(p.category==='Accessory') return 'Printed accessory';
    return 'Digital print'; }
  prodColour(p){ var n=(p.name||'').toLowerCase();
    if(/compliment|plain/.test(n)) return 'Ecru / natural';
    if(/damru/.test(n)) return 'Indigo';
    if(/portal/.test(n)) return 'Rust';
    if(/harmonium/.test(n)) return 'Charcoal';
    if(/sour bean/.test(n)) return 'Olive';
    if(/bubble/.test(n)) return 'Multi (painted)';
    if(/string|checker/.test(n)) return 'Monochrome';
    if(/frog/.test(n)) return 'Green';
    return 'Assorted'; }
  dimAgg(items, keyFn){ var self=this, m={};

    return Object.keys(m).map(function(k){ var g=m[k]; g.avg=g.value/g.count; return g; }).sort(function(a,z){return z.value-a.value;}); }

  deptTotals(){ var m={}; this.costs.forEach(function(c){ m[c.dept]=(m[c.dept]||0)+c.amt; }); return m; }
  pnlHead(c){ return ['Fabric','Paints','Digital Print','Articles','Art Experiment','Stitching'].indexOf(c.dept)>=0 ? 'Cost of materials consumed' : 'Other expenses'; }
  pnlSub(c){ if(this.pnlHead(c)==='Cost of materials consumed') return c.dept; return c.dept==='Legal'?'Legal & professional':'Advertising & promotion'; }
  pnlBuckets(group){ var self=this, map={}, order=0;
    this.costs.forEach(function(c){
      var head = group==='schedule'? self.pnlHead(c) : group==='dept'? c.dept : self.costClass(c).kind;
      var sub  = group==='schedule'? self.pnlSub(c) : c.dept;
      var sp = self.costSplit(c);
      if(!map[head]) map[head]={head:head, amount:0, base:0, tax:0, subs:{}};
      map[head].amount += c.amt; map[head].base += sp.base; map[head].tax += sp.tax;
      if(!map[head].subs[sub]) map[head].subs[sub]={label:sub, amt:0, base:0, items:[]};
      map[head].subs[sub].amt += c.amt; map[head].subs[sub].base += sp.base;
      map[head].subs[sub].items.push({label:c.item, amt:c.amt, base:sp.base});
    });
    return Object.keys(map).map(function(k){ var b=map[k];
      b.subList=Object.keys(b.subs).map(function(s){return b.subs[s];}).sort(function(a,z){return z.base-a.base;});
      return b; }).sort(function(a,z){return z.base-a.base;});
  }

  // ================= 06 · SCENARIO PLANNER =================
  scCompute(){ var s=this.sc(), t=this.taxonomy();
    var earnedToDate=this.revenue.reduce(function(a,r){return a+r.revenue;},0);
    var effAsp = s.asp*(1-s.discount/100);
    var contrib = effAsp - s.varUnit;                       // per-unit contribution margin
    var cm = effAsp>0? contrib/effAsp : 0;                  // contribution margin %
    var monthlyGross = s.units*effAsp;
    var monthlyVar = s.units*s.varUnit;
    var monthlyProfit = s.units*contrib - s.marketing;      // operating profit/month
    var beUnitsMonthly = contrib>0? s.marketing/contrib : Infinity;  // units/mo to cover ongoing overhead
    var sunk = t.total;                                     // already invested
    var remaining = Math.max(0, sunk - earnedToDate);       // still to recover
    var paybackMonths = monthlyProfit>0? remaining/monthlyProfit : Infinity;
    var horizonRev = monthlyGross*s.horizon;
    var horizonProfit = monthlyProfit*s.horizon;
    var netPosition = earnedToDate + horizonProfit - remaining; // cumulative vs full recovery... simplified
    return {s:s,t:t,effAsp:effAsp,contrib:contrib,cm:cm,monthlyGross:monthlyGross,monthlyVar:monthlyVar,
            monthlyProfit:monthlyProfit,beUnitsMonthly:beUnitsMonthly,sunk:sunk,remaining:remaining,
            paybackMonths:paybackMonths,horizonRev:horizonRev,horizonProfit:horizonProfit,earnedToDate:earnedToDate};
  }

        self.scenNum(self.money(r.horizonRev), s.horizon+'-month gross revenue', C.ink)),

          h('div',{style:{height:'12px',background:C.linesoft,borderRadius:'6px',overflow:'hidden'}},
            h('div',{style:{height:'100%',width:(b[1]/maxB*100)+'%',background:b[2],borderRadius:'6px'}})),
          h('div',{style:{fontSize:'11px',color:C.mute,marginTop:'4px'}}, b[3]));
      })),
      h('div',{style:{display:'flex',gap:'12px',marginTop:'6px',flexWrap:'wrap',fontSize:'12px',color:C.soft}},
        h('span',null,'Variable cost / piece: ',h('b',null,self.money(t.varPerUnit))),
        h('span',null,'\u00B7  Fixed base already sunk: ',h('b',null,self.money(t.growth+t.infra))))

    return h('div',null, head,
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'14px'}}, levers, outcomes),
      h('div',{style:{marginTop:'14px'}}, costCard));
  }

  // ================= 07 · YOY OVERVIEW =================
  renderYoY(){ const C=this.C, h=React.createElement, self=this;
    var r=this.scCompute(), t=this.taxonomy();
    var g=this.state.growth/100;
    // Year 0 = actuals to date; Year 1 = annualised run-rate; then grow
    var y0Rev=r.earnedToDate, y0Cost=t.total, y0Profit=y0Rev-y0Cost;
    var y1Rev=r.monthlyGross*12;
    var y1Var=r.monthlyVar*12;
    var y1Fixed=r.s.marketing*12;                 // ongoing overhead only (capex already sunk)
    var y1Profit=y1Rev-y1Var-y1Fixed;
    var years=[{k:'FY26', tag:'Actual to date', rev:y0Rev, cost:y0Cost, profit:y0Profit, actual:true}];
    var pr=y1Rev, pv=y1Var, pf=y1Fixed;
    for(var i=0;i<3;i++){
      var scale=Math.pow(1+g,i);
      var rev=y1Rev*scale, vcost=y1Var*scale, fcost=y1Fixed*(1+g*0.4*i); // overhead grows slower
      years.push({k:'FY'+(27+i), tag:i===0?'Run-rate yr':'Projected', rev:rev, cost:vcost+fcost, profit:rev-vcost-fcost, actual:false});

            h('div',{style:{display:'flex',gap:'6px',alignItems:'flex-end',height:'100%'}},
              h('div',{title:'Revenue '+self.money(y.rev),style:{flex:1,height:Math.max(2,y.rev/maxRev*100)+'%',background:C.pos,borderRadius:'5px 5px 0 0'}}),
              h('div',{title:'Cost '+self.money(y.cost),style:{flex:1,height:Math.max(2,y.cost/maxRev*100)+'%',background:C.neg,borderRadius:'5px 5px 0 0',opacity:0.85}})));
        })),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat('+years.length+',1fr)',gap:'18px',marginTop:'8px'}},
        years.map(function(y){
          return h('div',{key:y.k,style:{textAlign:'center'}},

            h('div',{style:{fontSize:'9.5px',color:C.mute,marginBottom:'4px'}}, y.tag),

      h('div',{style:{display:'flex',gap:'18px',marginTop:'14px',flexWrap:'wrap'}},
        self.legend(C.pos,'Revenue'), self.legend(C.neg,'Total cost'))

        h('span',{style:{fontFamily:C.mono,fontSize:'12.5px',textAlign:'right'}}, self.money(y.rev)),

  // ---- qty-aware money slices (stock value = price × quantity_on_hand) ----
  slices(){
    var b=this.state.brand;
    var inv = b==='all'? this.inventory : this.inventory.filter(function(r){return r.brand===b;});
    var rev = b==='all'? this.revenue   : this.revenue.filter(function(r){return r.brand===b;});
    var invested = this.costs.reduce(function(s,c){return s+c.amt;},0);          // company-wide
    var earned   = rev.reduce(function(s,r){return s+r.revenue;},0);             // net of returns
    var units    = inv.reduce(function(s,r){return s+(r.qty||0);},0);            // units on hand
    var stock    = inv.reduce(function(s,r){return s+r.price*(r.qty||0);},0);    // retail value
    var stockCost= inv.reduce(function(s,r){return s+((r.cost||0)*(r.qty||0));},0); // value at cost
    var unitsSold= rev.reduce(function(s,r){return s+r.units;},0);
    return {inv:inv, rev:rev, invested:invested, earned:earned, stock:stock, stockCost:stockCost,
            pieces:units, skuCount:inv.length, unitsSold:unitsSold};
  }

  // ---- qty-aware dimension aggregation ----
  dimAgg(items, keyFn){ var self=this, m={};
    items.forEach(function(p){ var k=keyFn.call(self,p); var q=p.qty||1;
      if(!m[k]) m[k]={key:k,count:0,value:0,min:Infinity,max:0};
      m[k].count+=q; m[k].value+=p.price*q; m[k].min=Math.min(m[k].min,p.price); m[k].max=Math.max(m[k].max,p.price); });
    return Object.keys(m).map(function(k){ var g=m[k]; g.avg=g.count?g.value/g.count:0; return g; }).sort(function(a,z){return z.value-a.value;});
  }

  // ---- taxonomy: prefer declared cost_function; pieces made is qty-aware ----
  taxonomy(){ var self=this; var b={cogs:0, growth:0, infra:0};
    this.costs.forEach(function(c){ b[self.costClass(c).bucket]+=c.amt; });
    var madeUnits = this.inventory.reduce(function(a,p){return a+(p.qty||1);},0);
    var piecesMade = madeUnits + this.revenue.reduce(function(a,r){return a+r.units;},0);
    return { cogs:b.cogs, growth:b.growth, infra:b.infra, total:b.cogs+b.growth+b.infra,
             piecesMade:piecesMade, varPerUnit: piecesMade? b.cogs/piecesMade : 0 };
  }

  // ---- tax split uses the invoice's gst_amount when present ----
  costSplit(c){
    if(c.gstAmt!=null && c.gstAmt>0 && c.gstAmt<c.amt){ var base=c.amt-c.gstAmt; return {gross:c.amt, base:base, tax:c.gstAmt, rate:c.gstAmt/base}; }
    var r=this.gstRate(c); var b=c.amt/(1+r); return {gross:c.amt, base:b, tax:c.amt-b, rate:r};
  }

  // ---- classification prefers declared cost_function / cost_stage ----
  costClass(c){
    if(c.func){
      if(c.func==='Product') return {bucket:'cogs', kind:'Variable (COGS)', label:'Materials & making'};
      if(c.func==='Overheads') return {bucket:'infra', kind:'Fixed / overhead', label:c.dept||'Overheads'};
      var i=(c.item||'').toLowerCase();
      if(/website|hosting|elementor/.test(i)) return {bucket:'infra', kind:'One-time capex', label:'Digital infrastructure'};
      return {bucket:'growth', kind:'Growth / discretionary', label:'Campaign & content'};
    }
    // fallback: infer from department + item text
    var i2=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){ if(/website|hosting|elementor/.test(i2)) return {bucket:'infra', kind:'One-time capex', label:'Digital infrastructure'}; return {bucket:'growth', kind:'Growth / discretionary', label:'Campaign & content'}; }
    if(d==='Legal') return {bucket:'infra', kind:'One-time capex', label:'Legal & IP'};
    return {bucket:'cogs', kind:'Variable (COGS)', label:'Materials & making'};
  }
  costNode(c){
    if(c.func){
      if(c.func==='Product') return {l1:'Product', l2:(/exp/i.test(c.stage)?'Silhouette & R&D experiments':'Final production')};
      if(c.func==='Overheads') return {l1:'Overheads', l2:(c.dept==='Legal'?'Legal & IP':(c.dept||'Overheads'))};
      var i=(c.item||'').toLowerCase();
      if(/website|hosting|elementor/.test(i)) return {l1:'Marketing & brand', l2:'Digital infrastructure'};
      return {l1:'Marketing & brand', l2:'Campaign & content'};
    }
    var i2=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){ if(/website|hosting|elementor/.test(i2)) return {l1:'Marketing & brand', l2:'Digital infrastructure'}; return {l1:'Marketing & brand', l2:'Campaign & content'}; }
    if(d==='Legal') return {l1:'Overheads', l2:'Legal & IP'};
    var exp = d==='Art Experiment' || /sample|experiment|linocut|cutout|recce|\bv2\b/.test(i2);
    return {l1:'Product', l2: exp?'Silhouette & R&D experiments':'Final production'};
  }

  // ---- P&L Schedule III mapping prefers cost_function ----
  pnlHead(c){ if(c.func) return c.func==='Product'?'Cost of materials consumed':'Other expenses';
    return ['Fabric','Paints','Digital Print','Articles','Art Experiment','Stitching'].indexOf(c.dept)>=0 ? 'Cost of materials consumed' : 'Other expenses'; }
  pnlSub(c){ if(c.func){ if(c.func==='Product') return c.dept||'Materials';
      return c.dept==='Legal'?'Legal & professional':(c.func==='Marketing & brand'?'Advertising & promotion':(c.dept||'Other expenses')); }
    if(this.pnlHead(c)==='Cost of materials consumed') return c.dept; return c.dept==='Legal'?'Legal & professional':'Advertising & promotion'; }

  // ---- fabric from the column when present ----
  fabricColor(name){ var m={'Bamboo':'#2F6D77','Linen (Jaipur)':'#557426','Egyptian Cotton':'#0B7EA8',
    'Chindhi / offcuts':'#B7791F','Hand-painted':'#8A6D3B','Denim':'#6B5CA5'};

  invFabric(p){ if(p.fabric) return {name:p.fabric, col:this.fabricColor(p.fabric)};

  // ---- product attributes from columns when present, else derived ----
  prodSilhouette(p){ if(p.silhouette) return p.silhouette; var c=p.category;
    if(c==='Accessory') return 'Accessory'; if(c==='Jacket'||c==='Hand-painted Jacket') return 'Jacket / outerwear';
    if(c==='Crop Shirt') return 'Crop top'; if(c==='Long Shirt') return 'Longline shirt'; return 'Shirt'; }
  prodProportion(p){ if(p.proportion) return p.proportion; var c=p.category;
    if(c==='Crop Shirt') return 'Cropped'; if(c==='Long Shirt') return 'Longline';
    if(c==='Jacket'||c==='Hand-painted Jacket') return 'Outerwear'; if(c==='Accessory') return 'Accessory'; return 'Regular'; }
  prodTechnique(p){ if(p.technique) return p.technique; var n=(p.name||'').toLowerCase();
    if(/hand paint/.test(n)||p.category==='Hand-painted Jacket') return 'Hand-painted';
    if(/plain/.test(n)) return 'Plain / solid'; if(/checker/.test(n)) return 'Woven check';

  prodColour(p){ if(p.colour) return p.colour; var n=(p.name||'').toLowerCase();
    if(/compliment|plain/.test(n)) return 'Ecru / natural'; if(/damru/.test(n)) return 'Indigo';
    if(/portal/.test(n)) return 'Rust'; if(/harmonium/.test(n)) return 'Charcoal'; if(/sour bean/.test(n)) return 'Olive';
    if(/bubble/.test(n)) return 'Multi (painted)'; if(/string|checker/.test(n)) return 'Monochrome'; if(/frog/.test(n)) return 'Green'; return 'Assorted'; }

  // ---- scenario defaults: real unit_cost + real monthly marketing when available ----
  monthsActive(){ var ds=this.costs.map(function(c){return c._d;}).filter(Boolean); if(!ds.length) return 1;
    var lo=new Date(Math.min.apply(null,ds)), hi=new Date(Math.max.apply(null,ds));
    return Math.max(1, (hi.getFullYear()-lo.getFullYear())*12 + (hi.getMonth()-lo.getMonth()) + 1); }
  scDefaults(){ var self=this, t=this.taxonomy();
    var sold=this.revenue.reduce(function(a,r){return a+r.units;},0);
    var asp = sold? this.revenue.reduce(function(a,r){return a+r.revenue;},0)/sold : 9000;
    var costRows=this.inventory.filter(function(p){return p.cost>0;});
    var wUnits=costRows.reduce(function(a,p){return a+(p.qty||1);},0);
    var varUnit = wUnits? costRows.reduce(function(a,p){return a+p.cost*(p.qty||1);},0)/wUnits : Math.round(t.varPerUnit);
    var avgList = this.inventory.length? this.inventory.reduce(function(a,p){return a+p.price*(p.qty||1);},0)/this.inventory.reduce(function(a,p){return a+(p.qty||1);},0) : asp;
    var mkt=this.costs.filter(function(c){ return self.costClass(c).bucket==='growth'; });
    var months=this.monthsActive();
    var marketing = mkt.length? Math.round(mkt.reduce(function(a,c){return a+c.amt;},0)/months) : 15000;

      if(hasSpend){ base.push(h('span',{key:'e',style:{fontFamily:C.mono,fontSize:'11.5px',textAlign:'right',color:C.soft}}, sp&&sp.cost?self.inr(sp.cost):'–'));
        base.push(h('span',{key:'f',style:{fontFamily:C.mono,fontSize:'11.5px',fontWeight:600,textAlign:'right',color: roas==null?C.mute:(roas>=1?C.pos:C.neg)}}, roas==null?'–':roas.toFixed(1)+'×')); }
      return h('div',{key:k,style:{display:'grid',gridTemplateColumns:cols,gap:'10px',alignItems:'center',padding:'10px 0',borderBottom:'1px solid '+C.linesoft,opacity:(live||sp)?1:0.5}}, base);
    });
    var liveCount=Object.keys(chMap).length;
    var channelCard=self.card([
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:'8px'}},
        h('div',null, self.h3('Channel-level performance'), self.sub('Revenue by route to market'+(hasSpend?' · spend & ROAS from the CHANNELS tab':' · add CHANNELS rows for spend & ROAS'))),
        h('div',{style:{fontFamily:C.mono,fontSize:'10px',color:C.mute}}, liveCount+' of '+allCh.length+' channels live')),
      h('div',{style:{marginTop:'12px'}}, chHead, chRows)
    ], {marginTop:'14px'});

    // city
    var cityMap={}; s.rev.forEach(function(r){ cityMap[r.geo]=(cityMap[r.geo]||0)+r.revenue; });
    var cityKeys=Object.keys(cityMap).sort(function(a,b){return cityMap[b]-cityMap[a];});
    var cityMax=cityKeys.length?cityMap[cityKeys[0]]:1;
    var cityCard=self.card([
      self.h3('Where buyers are'), self.sub('Revenue by city — from the REVENUE tab'),
      h('div',{style:{marginTop:'12px'}}, cityKeys.map(function(k){ return self.hbar(k||'—', cityMap[k], cityMax, C.ps, self.pct(cityMap[k]/s.earned)); }))
    ]);

    // audience from CUSTOMERS (real when present, else illustrative)
    var custs = self.state.brand==='all'? self.customers : self.customers.filter(function(c){return c.brand===self.state.brand;});
    var ageReal=custs.filter(function(c){return c.age;}), genReal=custs.filter(function(c){return c.gender;});
    function dist(list, key, ord){ var m={}; list.forEach(function(c){ var v=c[key]; if(v) m[v]=(m[v]||0)+1; });
      var keys=ord? ord.filter(function(k){return m[k];}).concat(Object.keys(m).filter(function(k){return ord.indexOf(k)<0;})) : Object.keys(m).sort(function(a,b){return m[b]-m[a];});
      var tot=keys.reduce(function(a,k){return a+m[k];},0)||1; return keys.map(function(k){return [k, m[k]/tot];}); }
    var realAudience = ageReal.length>=3 || genReal.length>=3;
    var ages = realAudience? dist(ageReal,'age',['18–24','25–34','35–44','45+']) : [['18–24',0.30],['25–34',0.44],['35–44',0.18],['45+',0.08]];
    var genderCols={'Women':C.hb,'Men':C.ps,'Unspecified':C.mute};
    var genders = realAudience? dist(genReal,'gender',['Women','Men','Unspecified']).map(function(g){return [g[0],g[1],genderCols[g[0]]||C.mute];}) : [['Women',0.56,C.hb],['Men',0.40,C.ps],['Unspecified',0.04,C.mute]];
    var barRow=function(label, frac, col){ return h('div',{key:label,style:{display:'grid',gridTemplateColumns:'92px 1fr 46px',gap:'10px',alignItems:'center',padding:'6px 0'}},
      h('span',{style:{fontSize:'12px',color:C.soft}}, label),
      h('div',{style:{height:'9px',background:C.linesoft,borderRadius:'5px',overflow:'hidden'}}, h('div',{style:{height:'100%',width:(frac*100)+'%',background:col,borderRadius:'5px'}})),
      h('span',{style:{fontFamily:C.mono,fontSize:'11.5px',fontWeight:600,textAlign:'right'}}, self.pct(frac))); };
    var audienceCard=self.card([
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:'8px'}},
        h('div',null, self.h3('Who’s buying'), self.sub(realAudience? custs.length+' customers · from the CUSTOMERS tab' : 'Age & gender of your audience')),
        realAudience? null : h('span',{className:'diag',style:{padding:'3px 9px',borderRadius:'999px',fontFamily:C.mono,fontSize:'8.5px',letterSpacing:'0.08em',textTransform:'uppercase',color:'#7a5410',fontWeight:700}}, 'Illustrative')),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'22px',marginTop:'14px'}},
        h('div',null, h('div',{style:{fontFamily:C.mono,fontSize:'10px',letterSpacing:'0.08em',textTransform:'uppercase',color:C.mute,marginBottom:'4px'}},'Age'), ages.map(function(a){return barRow(a[0],a[1],C.amber);})),
        h('div',null, h('div',{style:{fontFamily:C.mono,fontSize:'10px',letterSpacing:'0.08em',textTransform:'uppercase',color:C.mute,marginBottom:'4px'}},'Gender'), genders.map(function(g){return barRow(g[0],g[1],g[2]);}))),
      realAudience? null : h('div',{style:{fontSize:'11px',color:C.mute,marginTop:'12px',lineHeight:1.5,fontStyle:'italic'}}, 'Sample shape — fill age_band & gender in the CUSTOMERS tab and this reads live.')
    ]);

    // sell-through by category (qty-aware)
    var norm=function(c){ return c==='Shirts'?'Shirt':c; };
    var soldByCat={}, madeByCat={};
    s.rev.forEach(function(r){ var c=norm(r.category); soldByCat[c]=(soldByCat[c]||0)+r.units; });
    s.inv.forEach(function(p){ var c=norm(p.category); madeByCat[c]=(madeByCat[c]||0)+(p.qty||1); });
    Object.keys(soldByCat).forEach(function(c){ madeByCat[c]=(madeByCat[c]||0)+soldByCat[c]; });
    var catKeys=Object.keys(madeByCat).sort(function(a,b){return madeByCat[b]-madeByCat[a];});
    var stCard=self.card([
      self.h3('Sell-through by category'), self.sub('Units sold vs units available — what actually moves'),
      h('div',{style:{marginTop:'12px'}}, catKeys.map(function(c){ var made=madeByCat[c], sold=soldByCat[c]||0, rate=made?sold/made:0;
        return h('div',{key:c,style:{display:'grid',gridTemplateColumns:'130px 1fr 70px',gap:'10px',alignItems:'center',padding:'8px 0',borderBottom:'1px solid '+C.linesoft}},
          h('span',{style:{fontSize:'12.5px',color:C.soft}}, c||'—'),
          h('div',{style:{height:'9px',background:C.linesoft,borderRadius:'5px',overflow:'hidden'}}, h('div',{style:{height:'100%',width:Math.max(rate*100,sold?2:0)+'%',background:rate>0?C.pos:C.mute,borderRadius:'5px'}})),
          h('span',{style:{fontFamily:C.mono,fontSize:'11px',textAlign:'right',color:rate>0?C.pos:C.mute}}, sold+'/'+made)); }))
    ]);

    // price architecture (qty-aware)
    var bands=[['Entry','< ₹5k',0,5000,C.ps],['Core','₹5k–₹12k',5000,12000,C.amber],['Premium','> ₹12k',12000,1e9,C.hb]];
    var bandData=bands.map(function(b){ var items=s.inv.filter(function(p){return p.price>=b[2]&&p.price<b[3];});
      return {name:b[0],range:b[1],col:b[4],count:items.reduce(function(a,p){return a+(p.qty||1);},0),value:items.reduce(function(a,p){return a+p.price*(p.qty||1);},0)}; });
    var bandMaxC=Math.max.apply(null,bandData.map(function(b){return b.count;}))||1;
    var priceCard=self.card([
      self.h3('Price architecture'), self.sub('How your assortment spreads across price bands'),
      h('div',{style:{display:'flex',gap:'12px',alignItems:'flex-end',height:'150px',marginTop:'16px',paddingBottom:'2px',borderBottom:'1.5px solid '+C.ink}},
        bandData.map(function(b){ return h('div',{key:b.name,style:{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%',alignItems:'center'}},
          h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600,marginBottom:'4px'}}, b.count),
          h('div',{style:{width:'100%',height:Math.max(4,b.count/bandMaxC*100)+'%',background:b.col,borderRadius:'6px 6px 0 0'}})); })),
      h('div',{style:{display:'flex',gap:'12px',marginTop:'8px'}}, bandData.map(function(b){ return h('div',{key:b.name,style:{flex:1,textAlign:'center'}},
        h('div',{style:{fontSize:'12px',fontWeight:600}}, b.name), h('div',{style:{fontFamily:C.mono,fontSize:'9.5px',color:C.mute}}, b.range),
        h('div',{style:{fontFamily:C.mono,fontSize:'10.5px',color:C.soft,marginTop:'2px'}}, self.money(b.value))); }))
    ]);

    var rows=s.rev.map(function(r,i){ var bm=self.brandsMeta[r.brand]||{name:r.brand};
      return h('div',{key:i,style:{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:'12px',alignItems:'center',padding:'12px 0',borderBottom:'1px solid '+C.linesoft}},
        h('span',{style:{fontFamily:C.mono,fontSize:'10.5px',color:C.mute,whiteSpace:'nowrap'}}, r.date),
        h('div',{style:{minWidth:0}}, h('div',{style:{fontSize:'13px',fontWeight:600}}, r.collection),
          h('div',{style:{fontSize:'11px',color:C.mute}}, bm.name+' · '+r.category+' · '+r.channel+' · '+r.geo)),
        h('span',{style:{fontFamily:C.serif,fontSize:'20px',whiteSpace:'nowrap'}}, self.inr(r.revenue))); });
    var log=self.card([ self.h3('Every sale, logged'), self.sub('Straight from the REVENUE tab'), h('div',{style:{marginTop:'8px'}}, rows) ], {marginTop:'14px'});

    return h('div',null, head, kpis, channelCard,
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(340px,1fr))',gap:'14px',marginTop:'14px'}}, cityCard, audienceCard),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(340px,1fr))',gap:'14px',marginTop:'14px'}}, stCard, priceCard),
      log);
  }


  // ---- 08 · data-quality guards + business signals (Actions "Needs attention") ----
  computedAlerts(){ const self=this; var s=this.slices();
    var total=this.costs.reduce(function(a,c){return a+c.amt;},0);
    var dept={}; this.costs.forEach(function(c){ dept[c.dept]=(dept[c.dept]||0)+c.amt; });
    var out=[];

    // --- data quality: things that silently skew the numbers ---
    var swapped=this.inventory.filter(function(p){ return p.cost>0 && p.price>0 && p.cost>p.price; });
    if(swapped.length) out.push({sev:'neg',
      title:swapped.length+' SKU'+(swapped.length>1?'s have':' has')+' cost above price',
      detail:'unit_cost is larger than unit_price on these rows — almost always the two columns are swapped, which inverts margins, stock value and the P&L. e.g. '+swapped[0].name+' shows '+self.money(swapped[0].cost)+' cost vs '+self.money(swapped[0].price)+' price.',
      meta:'Data quality · INVENTORY'});

    var blankRev=this.revenue.filter(function(r){ return r.units>0 && !(r.revenue>0); });
    if(blankRev.length) out.push({sev:'neg',
      title:blankRev.length+' sold row'+(blankRev.length>1?'s have':' has')+' no revenue amount',
      detail:'units_sold is filled but revenue is blank on these REVENUE rows, so earned and every sales metric is understated. Add the sale value.',
      meta:'Data quality · REVENUE'});

    var blankCost=this.inventory.filter(function(p){ return !(p.cost>0); });
    if(blankCost.length) out.push({sev:'amber',
      title:blankCost.length+' SKU'+(blankCost.length>1?'s are':' is')+' missing unit_cost',
      detail:'true margin, COGS and closing-stock-at-cost need a unit_cost on every INVENTORY row.',
      meta:'Data quality · INVENTORY'});

    var seen={}; this.inventory.forEach(function(p){ if(p.sku) seen[p.sku]=(seen[p.sku]||0)+1; });
    var dups=Object.keys(seen).filter(function(k){return seen[k]>1;});
    if(dups.length) out.push({sev:'amber',
      title:dups.length+' SKU code'+(dups.length>1?'s repeat':' repeats')+' across pieces',
      detail:'e.g. '+dups[0]+' is on '+seen[dups[0]]+' rows. A SKU should be unique per piece so a sale links to the exact item — keep the family code as a prefix and add a sequence (e.g. '+dups[0]+'-01, '+dups[0]+'-02).',
      meta:'Data quality · INVENTORY'});

    // --- business signals ---
    if(s.pieces) out.push({sev:'neg', title:s.pieces+' finished pieces unsold',
      detail:self.money(s.stock)+' of stock tied up — turning it to cash is the whole game right now.', meta:'Inventory'});
    if(total) out.push({sev:'neg', title:'Only '+self.pct(s.earned/total,1)+' of investment recovered',
      detail:self.money(s.earned)+' earned against '+self.money(total)+' invested.', meta:'Cash · break-even'});
    if(total && dept['Marketing']) out.push({sev:'amber', title:'Marketing is '+self.pct(dept['Marketing']/total)+' of all spend',
      detail:self.money(dept['Marketing'])+' on shoots, site & ads vs '+self.money(s.earned)+' of sales to show for it so far.', meta:'Costs'});

    return out;
  }

}
var __root = ReactDOM.createRoot(document.getElementById('root'));
__root.render(React.createElement(Dashboard));
})();
