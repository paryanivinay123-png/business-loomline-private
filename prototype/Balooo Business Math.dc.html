<style>

<div style="min-height:100vh;padding-bottom:8px">
  <div style="background:#161511;color:#F3F2ED">
    <div style="max-width:1440px;margin:0 auto;padding:16px 32px;display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap">

  {{ body }}
  <div style="max-width:1440px;margin:0 auto;padding:14px 32px 40px;font-family:'Spline Sans Mono',ui-monospace,monospace;font-size:10px;color:#9B9587;letter-spacing:0.04em">Balooo · internal decision layer · figures read from your Business Loomline sheet</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1000}}">
class Component extends DCLogic {
  state = { tab: 'math', brand: 'all', moves: {}, adds: [],
    sc: null, growth: 60, reinvest: 40, pnlGroup: 'schedule', pnlOpen: {}, costOpen: {} };

  // ---- hierarchical cost taxonomy: Function > Sub-group > line item ----
  costNode(c){ var i=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){
      if(/website|hostinger|elementor/.test(i)) return {l1:'Marketing & brand', l2:'Digital infrastructure'};
      return {l1:'Marketing & brand', l2:'Campaign & content'};
    }
    if(d==='Legal') return {l1:'Overheads', l2:'Legal & IP'};
    // everything else is Product; split experiment vs final
    var exp = d==='Art Experiment' || /sample|experiment|linocut|cutout|recce|\bv2\b/.test(i);
    return {l1:'Product', l2: exp?'Silhouette & R&D experiments':'Final production'};
  }
  costTree(){ var self=this, m={};
    this.costs.forEach(function(c){ var n=self.costNode(c);
      if(!m[n.l1]) m[n.l1]={key:n.l1, amount:0, subs:{}};
      m[n.l1].amount+=c.amt;
      if(!m[n.l1].subs[n.l2]) m[n.l1].subs[n.l2]={key:n.l2, amount:0, items:[]};
      m[n.l1].subs[n.l2].amount+=c.amt;
      m[n.l1].subs[n.l2].items.push({label:c.item, amt:c.amt, dept:c.dept});
    });
    return Object.keys(m).map(function(k){ var g=m[k];
      g.subList=Object.keys(g.subs).map(function(s){ var sb=g.subs[s]; sb.items.sort(function(a,z){return z.amt-a.amt;}); return sb; }).sort(function(a,z){return z.amount-a.amount;});
      return g; }).sort(function(a,z){return z.amount-a.amount;});
  }
  toggleCost(k){ var o=Object.assign({}, this.state.costOpen); o[k]=!o[k]; this.setState({costOpen:o}); }

  // ---- tax model: split each procurement/service into input cost + GST paid (recoverable ITC) ----
  // Amounts in the sheet are treated as GST-inclusive; add explicit base_amount / gst columns to make this exact.
  gstRate(c){ var d=c.dept;
    if(d==='Marketing'||d==='Legal') return 0.18;          // services
    if(d==='Fabric'||d==='Paints'||d==='Articles') return 0.05; // textiles & materials
    return 0.05;                                            // print, stitching, job work
  }
  costSplit(c){ var r=this.gstRate(c); var base=c.amt/(1+r); return {gross:c.amt, base:base, tax:c.amt-base, rate:r}; }
  taxTotals(list){ var self=this; list=list||this.costs; var g=0,b=0,t=0;
    list.forEach(function(c){ var s=self.costSplit(c); g+=s.gross; b+=s.base; t+=s.tax; });
    return {gross:g, base:b, tax:t}; }

  // ---- palette ----
  C = { paper:'#F3F2ED', card:'#FFFFFF', soft:'#5D594F', mute:'#9B9587', ink:'#1B1A17',
        line:'#E6E3DA', linesoft:'#F1EFE8', hair:'#EEEBE3', dark:'#161511',
        hb:'#A13E63', ps:'#2F6D77', pos:'#2E7D4F', neg:'#C1442E', amber:'#B7791F',
        serif:"'Instrument Serif',Georgia,serif", mono:"'Spline Sans Mono',ui-monospace,monospace" };
  DCOL = ['#A13E63','#B7791F','#0B7EA8','#557426','#6B5CA5','#2F6D77','#C1442E','#8A6D3B'];

  // ======= REAL DATA (from Business Loomline.xlsx) =======
  brandsMeta = { HB:{name:'The Hullabalooo', col:'#A13E63', tag:'House of drama'},
                 PS:{name:'The Pappy Show', col:'#2F6D77', tag:'Street & play'} };
  revenue = [
    {date:'20 Jun 2026', brand:'HB', channel:'Retail', category:'Shirts', collection:'Launch · Compliments', geo:'Mumbai', revenue:8000, units:1},
    {date:'17 Jul 2026', brand:'HB', channel:'Retail', category:'Shirts', collection:'Launch · Harm the Harmonium', geo:'Mumbai', revenue:10000, units:1}
  ];
  costs = [
    {dept:'Paints', item:'Jacquard fabric paints', amt:3400},
    {dept:'Fabric', item:'Bamboo fabric 10m', amt:6300},
    {dept:'Digital Print', item:'Digital print sample w/ fabric', amt:1400},
    {dept:'Fabric', item:'Material for cutout sizing', amt:1000},
    {dept:'Fabric', item:'Chindhi market kapda', amt:1500},
    {dept:'Fabric', item:'Bamboo fabric 15m', amt:8100},
    {dept:'Articles', item:'Threads', amt:1000},
    {dept:'Art Experiment', item:'Linocut material', amt:3000},
    {dept:'Digital Print', item:'Digital print', amt:4000},
    {dept:'Fabric', item:'Bamboo cloth & print sample (v2)', amt:3000},
    {dept:'Marketing', item:'Hullabalooo website — one time', amt:46000},
    {dept:'Fabric', item:'Jaipur sample (Bapu Bazar) — Linen', amt:9000},
    {dept:'Fabric', item:'Jaipur sample (Fabriclore)', amt:3245},
    {dept:'Digital Print', item:'New digital print', amt:4000},
    {dept:'Stitching', item:'New stitching', amt:1800},
    {dept:'Marketing', item:'1st collection shoot — product', amt:10500},
    {dept:'Marketing', item:'1st collection shoot — petrol', amt:5000},
    {dept:'Marketing', item:'1st collection shoot — food', amt:8000},
    {dept:'Marketing', item:'1st collection shoot — stay', amt:3000},
    {dept:'Marketing', item:'1st collection shoot — equipment', amt:15000},
    {dept:'Marketing', item:'1st collection shoot — MUA', amt:8000},
    {dept:'Marketing', item:'1st collection shoot — recce', amt:10000},
    {dept:'Marketing', item:'Hostinger', amt:5500},
    {dept:'Marketing', item:'Elementor — HB + PS', amt:12000},
    {dept:'Fabric', item:'Egyptian cotton 32m', amt:6000},
    {dept:'Legal', item:'IP registration', amt:15000}
  ];
  inventory = [
    {brand:'HB', name:'Unisex Compliments', category:'Shirt', price:9595},
    {brand:'HB', name:'Unisex Damru Yatra', category:'Shirt', price:8585},
    {brand:'HB', name:'Female Croptop — Portals', category:'Crop Shirt', price:9999},
    {brand:'HB', name:'Unisex — Harm the Harmonium', category:'Shirt', price:10100},
    {brand:'HB', name:'Female Croptop — Sour Beans', category:'Crop Shirt', price:12345},
    {brand:'HB', name:'Lost Bubble — Hand Painting', category:'Hand-painted Jacket', price:7272},
    {brand:'HB', name:'Female Long Shirt — Chaotic Strings', category:'Long Shirt', price:12121},
    {brand:'HB', name:'Female Long Shirt — Checkered L Move', category:'Long Shirt', price:12121},
    {brand:'HB', name:'Unisex Plain', category:'Shirt', price:5995},
    {brand:'HB', name:'Frog Female Jacket', category:'Jacket', price:37373},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:4545},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:3535},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:3535},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:2002},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:1415},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:1112},
    {brand:'HB', name:'Handkerchief', category:'Accessory', price:888},
    {brand:'HB', name:'Pocket Square', category:'Accessory', price:4545},
    {brand:'HB', name:'Pocket Square', category:'Accessory', price:1212},
    {brand:'HB', name:'Pocket Square', category:'Accessory', price:4545},
    {brand:'HB', name:'Badges', category:'Accessory', price:555},
    {brand:'HB', name:'Badges', category:'Accessory', price:789},
    {brand:'HB', name:'Badges', category:'Accessory', price:555},
    {brand:'HB', name:'Badges', category:'Accessory', price:555}
  ];

  alerts = [
    {title:'Finalise PS website', owner:'Vinay', status:'To do', note:'Get on a call with Rohit to finalise the site', due:'23 Jul 2026'},
    {title:'Speak to the digital guy', owner:'Vinay', status:'To do', note:'Marketplace opportunities', due:'23 Jul 2026'},
    {title:'Shirt delivery — HB', owner:'Rohit', status:'To do', note:'Harm the Harmonium for Amey Kadam. Payment received.', due:'27 Jul 2026'},
    {title:'PS content', owner:'Vinay', status:'To do', note:'Written content from Atul — Vinay to close', due:'25 Jul 2026'},
    {title:'HB website', owner:'Rohit', status:'To do', note:'Chasing Hitesh to finish the website', due:'31 Jul 2026'},
    {title:'PS prints', owner:'Rohit', status:'To do', note:'Confirm final print costs for the T-shirt', due:'22 Jul 2026'},
    {title:'PS brochure', owner:'Rohit', status:'To do', note:'Print brochure for PS to share with people', due:'27 Jul 2026'},
    {title:'HB social post', owner:'Rohit', status:'In progress', note:'Post Wed / Fri / Sun', due:''}
  ];

  TABS = [ {id:'math', t:'01 · The math'}, {id:'pnl', t:'02 · P&L'}, {id:'costs', t:'03 · Where money went'},
           {id:'product', t:'04 · What we\u2019ve made'}, {id:'sales', t:'05 · Sales & channels'},
           {id:'inventory', t:'06 · Inventory'}, {id:'yoy', t:'07 · YoY overview'}, {id:'actions', t:'08 · Actions & alerts'},
           {id:'planner', t:'09 · Scenario planner'} ];

  // ---- fabric assignment (sheet has no per-SKU fabric column; mapped from category + the fabrics you actually bought) ----
  invFabric(p){ var c=p.category, n=(p.name||'').toLowerCase();
    if(/hand paint/.test(n) || c==='Hand-painted Jacket') return {name:'Hand-painted (Chindhi base)', col:'#8A6D3B'};
    if(c==='Accessory') return {name:'Chindhi / offcuts', col:'#B7791F'};
    if(c==='Crop Shirt') return {name:'Egyptian Cotton', col:'#0B7EA8'};
    if(c==='Long Shirt') return {name:'Linen (Jaipur)', col:'#557426'};
    if(c==='Jacket') return {name:'Linen (Jaipur)', col:'#557426'};
    return {name:'Bamboo', col:'#2F6D77'};
  }

  // ---- cost taxonomy: classify every cost line into a business bucket ----
  costClass(c){
    var i=(c.item||'').toLowerCase(), d=c.dept;
    if(d==='Marketing'){
      if(/website|hostinger|elementor/.test(i)) return {bucket:'infra', kind:'One-time capex', label:'Digital infrastructure'};
      return {bucket:'growth', kind:'Growth / discretionary', label:'Campaign & content'};
    }
    if(d==='Legal') return {bucket:'infra', kind:'One-time capex', label:'Legal & IP'};
    return {bucket:'cogs', kind:'Variable (COGS)', label:'Materials & making'};
  }
  taxonomy(){ var self=this; var b={cogs:0, growth:0, infra:0};
    this.costs.forEach(function(c){ b[self.costClass(c).bucket]+=c.amt; });
    var piecesMade = this.inventory.length + this.revenue.reduce(function(a,r){return a+r.units;},0);
    return { cogs:b.cogs, growth:b.growth, infra:b.infra, total:b.cogs+b.growth+b.infra,
             piecesMade:piecesMade, varPerUnit: piecesMade? b.cogs/piecesMade : 0 };
  }

  // ---- scenario defaults auto-picked from the sheet ----
  scDefaults(){ var t=this.taxonomy();
    var sold=this.revenue.reduce(function(a,r){return a+r.units;},0);
    var asp = sold? this.revenue.reduce(function(a,r){return a+r.revenue;},0)/sold : 9000;
    var avgList = this.inventory.length? this.inventory.reduce(function(a,r){return a+r.price;},0)/this.inventory.length : asp;
    return { units:6, asp:Math.round(avgList), discount:10,
             varUnit:Math.round(t.varPerUnit), marketing:15000, horizon:12 };
  }
  sc(){ return this.state.sc || this.scDefaults(); }
  setSc(k,v){ var s=Object.assign({}, this.sc()); s[k]=v; this.setState({sc:s}); }
  resetSc(){ this.setState({sc:null}); }

  // ---- format ----
  inr(n){ return '\u20B9' + Math.round(n).toLocaleString('en-IN'); }
  money(n){ var neg=n<0; n=Math.abs(n); var s;
    if(n>=1e7) s='\u20B9'+(n/1e7).toFixed(2)+' Cr';
    else if(n>=1e5) s='\u20B9'+(n/1e5).toFixed(2)+' L';
    else if(n>=1000) s='\u20B9'+(n/1000).toFixed(1)+'k';
    else s='\u20B9'+Math.round(n);
    return (neg?'\u2212':'')+s; }
  pct(x,dp){ return (x*100).toFixed(dp==null?0:dp)+'%'; }

  setTab(id){ this.setState({tab:id}); }
  setBrand(b){ this.setState({brand:b}); }

  // ---- filtered slices ----
  slices(){
    var b=this.state.brand;
    var inv = b==='all'? this.inventory : this.inventory.filter(function(r){return r.brand===b;});
    var rev = b==='all'? this.revenue : this.revenue.filter(function(r){return r.brand===b;});
    var invested = this.costs.reduce(function(s,c){return s+c.amt;},0); // company-wide
    var earned = rev.reduce(function(s,r){return s+r.revenue;},0);
    var stock = inv.reduce(function(s,r){return s+r.price;},0);
    var unitsSold = rev.reduce(function(s,r){return s+r.units;},0);
    return {inv:inv, rev:rev, invested:invested, earned:earned, stock:stock, pieces:inv.length, unitsSold:unitsSold};
  }

  // ================= UI helpers =================
  card(children, extra){ const C=this.C;
    return React.createElement('div',{style:Object.assign({background:C.card,border:'1px solid '+C.line,borderRadius:'12px',padding:'20px 22px'},extra||{})}, children); }
  kicker(t){ const C=this.C;
    return React.createElement('div',{style:{fontFamily:C.mono,fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',color:C.mute}}, t); }
  h3(t){ const C=this.C;
    return React.createElement('h3',{style:{fontFamily:C.serif,fontSize:'19px',fontWeight:400,margin:0}}, t); }
  sub(t){ const C=this.C;
    return React.createElement('div',{style:{fontSize:'11.5px',color:C.mute,marginTop:'3px',lineHeight:1.5}}, t); }

  hbar(label, val, max, col, valLabel){ const C=this.C, h=React.createElement;
    return h('div',{key:label,style:{display:'grid',gridTemplateColumns:'170px 1fr auto',gap:'12px',alignItems:'center',padding:'8px 0',borderBottom:'1px solid '+C.linesoft}},
      h('span',{style:{fontSize:'12.5px',color:C.soft,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, label),
      h('div',{style:{height:'9px',background:C.linesoft,borderRadius:'5px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:Math.max(1,(val/max)*100).toFixed(1)+'%',background:col,borderRadius:'5px'}})),
      h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600,whiteSpace:'nowrap',minWidth:'56px',textAlign:'right'}}, valLabel||this.money(val)));
  }

  stat(label, big, sub, col){ const C=this.C, h=React.createElement;
    return h('div',{style:{background:C.card,border:'1px solid '+C.line,borderRadius:'12px',padding:'16px 18px',display:'flex',flexDirection:'column',gap:'8px'}},
      h('div',{style:{fontFamily:C.mono,fontSize:'9.5px',letterSpacing:'0.1em',textTransform:'uppercase',color:C.mute}}, label),
      h('div',{style:{fontFamily:C.serif,fontSize:'30px',lineHeight:1,color:col||C.ink}}, big),
      h('div',{style:{fontSize:'11px',color:C.mute,lineHeight:1.45}}, sub));
  }

  // ================= TAB BAR + FILTER =================
  chrome(){ const C=this.C, h=React.createElement, self=this;
    var tabs = h('div',{style:{display:'flex',gap:'26px',overflowX:'auto'}},
      this.TABS.map(function(t){ var on=self.state.tab===t.id;
        return h('button',{key:t.id,onClick:function(){self.setTab(t.id);},
          style:{appearance:'none',background:'none',border:'none',padding:'14px 2px 12px',cursor:'pointer',
                 fontFamily:C.mono,fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:600,whiteSpace:'nowrap',
                 borderBottom:'2px solid '+(on?C.ink:'transparent'),color:on?C.ink:C.mute}}, t.t); }));
    var brands=[['all','Both brands'],['HB','The Hullabalooo'],['PS','The Pappy Show']];
    var filter = h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',padding:'10px 0 12px',borderTop:'1px solid '+C.hair}},
      h('select',{value:this.state.brand,onChange:function(e){self.setBrand(e.target.value);},
        style:{background:C.paper,border:'1px solid #E3E0D8',borderRadius:'7px',padding:'7px 10px',fontSize:'12px',color:C.ink,outline:'none',cursor:'pointer',fontFamily:'inherit'}},
        brands.map(function(b){return h('option',{key:b[0],value:b[0]},b[1]);})),
      h('div',{style:{marginLeft:'auto',fontFamily:C.mono,fontSize:'10px',letterSpacing:'0.06em',textTransform:'uppercase',color:C.mute}},
        'All data to date · costs are company-wide'));
    return h('div',{style:{position:'sticky',top:0,zIndex:60,background:'#FBFAF7',borderBottom:'1px solid #E3E0D8'}},
      h('div',{style:{maxWidth:'1440px',margin:'0 auto',padding:'0 32px'}}, tabs, filter));
  }

  // ================= 01 · THE MATH =================
  renderMath(){ const C=this.C, h=React.createElement, self=this;
    var s=this.slices();
    var ifAllSold = s.earned + s.stock;
    var shortfall = s.invested - ifAllSold;
    var recovered = s.earned / s.invested;
    var potential = Math.min(1, ifAllSold / s.invested);
    var avgPiece = s.pieces? s.stock/s.pieces : 0;
    var piecesToBE = avgPiece? (s.invested - s.earned)/avgPiece : 0;

    var verdict, vsub;
    var tt = self.taxTotals();
    var inputCost = tt.base, gstPaid = tt.tax;   // input cost (ex-GST) + recoverable GST
    if(!s.pieces && !s.earned){
      verdict = self.brandsMeta[self.state.brand] ? self.brandsMeta[self.state.brand].name+' hasn\u2019t shipped yet.' : 'Nothing built here yet.';
      vsub = 'No inventory or sales recorded for this brand. The build spend below is shared across both houses.';
    } else {
      verdict = 'You\u2019ve invested '+self.inr(s.invested)+' and earned '+self.inr(s.earned)+' back \u2014 but '+self.inr(s.stock)+' is standing in your stockroom as finished pieces.';
      vsub = shortfall>0
        ? 'Sell everything you\u2019ve made at retail and you recover '+self.pct(potential)+' of the investment \u2014 still '+self.inr(shortfall)+' short of break-even. Roughly '+Math.ceil(piecesToBE)+' pieces at your average price of '+self.money(avgPiece)+' clears the gap.'
        : 'The stock you\u2019re holding is worth more than you\u2019ve spent \u2014 sell it and you\u2019re past break-even.';
    }

    var hero = h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(340px,1fr))',gap:'26px',background:C.card,border:'1px solid '+C.line,borderRadius:'12px',padding:'24px 26px',animation:'fadeUp 0.4s ease both'}},
      h('div',null,
        self.kicker('The read · all data to date'),
        h('div',{style:{fontFamily:C.serif,fontSize:'26px',lineHeight:1.25,marginTop:'8px',maxWidth:'600px'}}, verdict),
        h('div',{style:{fontSize:'13.5px',color:C.soft,marginTop:'10px',maxWidth:'620px',lineHeight:1.55}}, vsub)),
      h('div',{style:{borderLeft:'1px solid '+C.hair,paddingLeft:'26px',display:'flex',flexDirection:'column',gap:'14px',justifyContent:'center'}},
        self.kicker('The equation'),
        self.eqRow('Input cost', 'Ex-GST value of goods & services', self.money(inputCost), C.neg),
        self.eqRow('GST paid', 'On procurement & services \u00B7 recoverable ITC', self.money(gstPaid), C.amber),
        self.eqRow('Money made', s.unitsSold+' piece'+(s.unitsSold===1?'':'s')+' sold', self.money(s.earned), C.pos),
        self.eqRow('Money standing', s.pieces+' finished pieces, at retail', self.money(s.stock), C.amber)));

    var kpis = h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:'12px',marginTop:'14px'}},
      self.stat('Input cost', self.money(inputCost), 'ex-GST spend on goods & services', C.ink),
      self.stat('GST paid', self.money(gstPaid), 'recoverable input tax credit', self.DCOL[1]),
      self.stat('Cash out', self.money(s.invested), 'input cost + GST', C.neg),
      self.stat('Earned back', self.money(s.earned), self.pct(recovered,1)+' of cash out', C.pos),
      self.stat('Gap to break-even', shortfall>0? self.money(s.invested-s.earned):'\u20B90', shortfall>0? 'still to earn back':'covered', shortfall>0?C.neg:C.pos));

    var taxNote = h('div',{style:{background:'#FBFAF7',border:'1px solid '+C.hair,borderRadius:'10px',padding:'12px 16px',marginTop:'12px',fontSize:'12.5px',color:C.soft,lineHeight:1.6}},
      h('b',null,'Why split it: '), 'of your '+self.money(s.invested)+' cash out, '+self.money(gstPaid)+' is GST that\u2019s recoverable as input tax credit \u2014 not a true cost. Your real economic input is '+self.money(inputCost)+'. Once you register for GST and start charging output GST, that credit offsets what you owe, so net profit should always be measured on ex-GST figures. ',

  // ================= 03 · WHERE MONEY WENT (hierarchical) =================
  renderCosts(){ const C=this.C, h=React.createElement, self=this;
    var total=this.costs.reduce(function(s,c){return s+c.amt;},0);
    var tree=this.costTree();
    var L1COL={'Product':C.ps,'Marketing & brand':self.DCOL[0],'Overheads':self.DCOL[7]};

    // experiment vs final within Product
    var product=tree.filter(function(g){return g.key==='Product';})[0];
    var exp=0, fin=0;
    if(product){ product.subList.forEach(function(sb){ if(/experiment/i.test(sb.key)) exp+=sb.amount; else fin+=sb.amount; }); }
    var marketing=(tree.filter(function(g){return g.key==='Marketing & brand';})[0]||{amount:0}).amount;

    var head = h('div',{style:{marginTop:'2px'}},
      self.kicker('03 · Where the money went'),
      h('h2',{style:{fontFamily:C.serif,fontSize:'25px',margin:'6px 0 0',fontWeight:400}}, 'Every rupee, properly organised'),
      h('p',{style:{fontFamily:C.serif,fontStyle:'italic',fontSize:'16px',color:C.soft,margin:'8px 0 16px',maxWidth:'840px',lineHeight:1.5}},
        self.money(total)+' rolled up into three functions \u2014 Product, Marketing & brand, Overheads \u2014 with Product split into silhouette / R&D experiments vs final production. Click any group to open its line items.'));

    var kpis = h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(185px,1fr))',gap:'12px'}},
      self.stat('Total invested', self.money(total), this.costs.length+' entries', C.ink),
      self.stat('Product', self.money(exp+fin), self.pct((exp+fin)/total)+' of spend', C.ps),
      self.stat('\u2014 R&D / experiments', self.money(exp), 'samples, silhouette trials', self.DCOL[3]),
      self.stat('\u2014 Final production', self.money(fin), 'goods for sale', self.DCOL[5]),
      self.stat('Marketing & brand', self.money(marketing), self.pct(marketing/total)+' of spend', self.DCOL[0]));

    // experiment vs final production bar (the split the user cares about)
    var prodTot=exp+fin||1;
    var splitBar = self.card([
      self.h3('Experiment vs final production'),
      self.sub('Of the '+self.money(exp+fin)+' spent on product, how much was learning vs sellable goods'),
      h('div',{style:{display:'flex',height:'34px',borderRadius:'8px',overflow:'hidden',marginTop:'16px'}},
        h('div',{style:{width:(exp/prodTot*100).toFixed(1)+'%',background:self.DCOL[3],display:'flex',alignItems:'center',paddingLeft:'12px',color:'#fff',fontSize:'12px',fontWeight:600,minWidth:0}}, 'R&D '+self.pct(exp/prodTot)),
        h('div',{style:{width:(fin/prodTot*100).toFixed(1)+'%',background:self.DCOL[5],display:'flex',alignItems:'center',paddingLeft:'12px',color:'#fff',fontSize:'12px',fontWeight:600,minWidth:0}}, 'Final '+self.pct(fin/prodTot))),
      h('div',{style:{fontSize:'12px',color:C.soft,marginTop:'12px',lineHeight:1.55}},
        self.pct(exp/prodTot)+' of product spend went into experiments and samples \u2014 expected while you\u2019re finding silhouettes. As the line matures, watch this ratio fall so more of every rupee ends up as sellable stock.')
    ], {marginTop:'14px'});

    // the tree
    function itemRow(it){
      return h('div',{key:it.label,style:{display:'grid',gridTemplateColumns:'1fr 110px',gap:'8px',padding:'4px 0 4px 60px',borderTop:'1px dashed '+C.linesoft}},
        h('span',{style:{fontSize:'11.5px',color:C.mute,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, it.label+'  \u00B7  '+it.dept),
        h('span',{style:{fontFamily:C.mono,fontSize:'11.5px',color:C.soft,textAlign:'right'}}, self.inr(it.amt)));
    }
    function subRow(sb, l1key, col){
      var key='c2::'+l1key+'::'+sb.key, open=!!self.state.costOpen[key];
      var header=h('div',{onClick:function(){self.toggleCost(key);},
        style:{display:'grid',gridTemplateColumns:'14px 1fr 110px',gap:'8px',alignItems:'center',cursor:'pointer',padding:'7px 0 7px 26px',borderTop:'1px solid '+C.linesoft}},
        h('span',{style:{fontFamily:C.mono,fontSize:'10px',color:C.mute,transform:open?'rotate(90deg)':'none'}}, '\u25B8'),
        h('span',{style:{fontSize:'12.5px',fontWeight:600,color:C.soft}}, sb.key+'  \u00B7  '+sb.items.length),
        h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600,textAlign:'right'}}, self.inr(sb.amount)));
      return open? h('div',{key:key}, header, sb.items.map(itemRow)) : h('div',{key:key}, header);
    }
    var maxL1=Math.max.apply(null,tree.map(function(g){return g.amount;}));
    function l1Row(g){
      var key='c1::'+g.key, open=self.state.costOpen[key]!==false; // default open
      var col=L1COL[g.key]||C.mute;
      var header=h('div',{onClick:function(){self.toggleCost(key);},
        style:{display:'grid',gridTemplateColumns:'16px 1fr 90px 120px',gap:'8px',alignItems:'center',cursor:'pointer',padding:'11px 0',borderTop:'1.5px solid '+C.ink}},
        h('span',{style:{fontFamily:C.mono,fontSize:'12px',color:C.soft,transform:open?'rotate(90deg)':'none'}}, '\u25B8'),
        h('span',{style:{fontSize:'14px',fontWeight:700,display:'flex',alignItems:'center',gap:'8px'}},
          h('span',{style:{width:'11px',height:'11px',borderRadius:'3px',background:col,flex:'none'}}), g.key),
        h('div',{style:{height:'8px',background:C.linesoft,borderRadius:'4px',overflow:'hidden'}},
          h('div',{style:{height:'100%',width:(g.amount/maxL1*100)+'%',background:col,borderRadius:'4px'}})),
        h('span',{style:{fontFamily:C.mono,fontSize:'13.5px',fontWeight:700,textAlign:'right'}}, self.inr(g.amount)+'  ')) ;
      return open? h('div',{key:key}, header, g.subList.map(function(sb){return subRow(sb,g.key,col);})) : h('div',{key:key}, header);
    }
    var treeCard = self.card([
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:'8px',borderBottom:'1px solid '+C.line,paddingBottom:'10px'}},
        h('div',null, self.h3('Cost breakdown structure'), self.sub('Function \u2192 sub-group \u2192 line item \u00B7 click to expand or collapse')),
        h('div',{style:{fontFamily:C.mono,fontSize:'10px',color:C.mute}}, tree.length+' functions \u00B7 '+self.money(total))),
      h('div',{style:{marginTop:'2px'}}, tree.map(l1Row))
    ], {marginTop:'14px'});

    var sheetTip = self.card([
      self.h3('How to keep this clean in the sheet'),
      h('div',{style:{fontSize:'12.5px',color:C.soft,marginTop:'8px',lineHeight:1.65}},
        'Right now the structure is inferred from department + item text. To make it exact and future-proof, add two columns to your COSTS tab: ',
        h('b',null,'cost_function'),' (Product / Marketing & brand / Overheads) and ',
        h('b',null,'cost_stage'),' (Experiment / Final production / \u2014). Then every new row \u2014 including your coming silhouette experiments and final sale-ready pieces \u2014 lands in the right place automatically, and you can tag production spend straight to a SKU for true per-piece cost.')
    ], {marginTop:'14px'});

    return h('div',null, head, kpis, splitBar, treeCard, sheetTip);
  }

  // ================= 04 · WHAT WE'VE MADE (product insights) =================
  // --- attribute derivation: breaks each SKU down from its name + category ---
  prodSilhouette(p){ var c=p.category;
    if(c==='Accessory') return 'Accessory';
    if(c==='Jacket'||c==='Hand-painted Jacket') return 'Jacket / outerwear';
    if(c==='Crop Shirt') return 'Crop top';
    if(c==='Long Shirt') return 'Longline shirt';
    return 'Shirt'; }
  prodProportion(p){ var c=p.category;
    if(c==='Crop Shirt') return 'Cropped';
    if(c==='Long Shirt') return 'Longline';
    if(c==='Jacket'||c==='Hand-painted Jacket') return 'Outerwear';
    if(c==='Accessory') return 'Accessory';
    return 'Regular'; }
  prodTechnique(p){ var n=(p.name||'').toLowerCase();
    if(/hand paint/.test(n)||p.category==='Hand-painted Jacket') return 'Hand-painted';
    if(/plain/.test(n)) return 'Plain / solid';
    if(/checker/.test(n)) return 'Woven check';
    if(p.category==='Accessory') return 'Printed accessory';
    return 'Digital print'; }
  prodColour(p){ var n=(p.name||'').toLowerCase();
    if(/compliment|plain/.test(n)) return 'Ecru / natural';
    if(/damru/.test(n)) return 'Indigo';
    if(/portal/.test(n)) return 'Rust';
    if(/harmonium/.test(n)) return 'Charcoal';
    if(/sour bean/.test(n)) return 'Olive';
    if(/bubble/.test(n)) return 'Multi (painted)';
    if(/string|checker/.test(n)) return 'Monochrome';
    if(/frog/.test(n)) return 'Green';
    return 'Assorted'; }
  dimAgg(items, keyFn){ var self=this, m={};
    items.forEach(function(p){ var k=keyFn.call(self,p); if(!m[k]) m[k]={key:k,count:0,value:0,min:Infinity,max:0};
      m[k].count++; m[k].value+=p.price; m[k].min=Math.min(m[k].min,p.price); m[k].max=Math.max(m[k].max,p.price); });
    return Object.keys(m).map(function(k){ var g=m[k]; g.avg=g.value/g.count; return g; }).sort(function(a,z){return z.value-a.value;}); }

  dimCard(title, sub, groups, totCount, totVal, opts){ const C=this.C, h=React.createElement, self=this; opts=opts||{};
    var maxVal=Math.max.apply(null,groups.map(function(g){return g.value;}))||1;

      h('div',{style:{marginTop:'12px'}}, groups.map(function(g,i){ var col=self.DCOL[i%self.DCOL.length];
        return h('div',{key:g.key,style:{padding:'9px 0',borderBottom:'1px solid '+C.linesoft}},
          h('div',{style:{display:'grid',gridTemplateColumns:'150px 1fr 96px',gap:'10px',alignItems:'center'}},
            h('span',{style:{fontSize:'12.5px',fontWeight:600,display:'flex',alignItems:'center',gap:'7px'}},
              h('span',{style:{width:'9px',height:'9px',borderRadius:'2px',background:col,flex:'none'}}), g.key),
            h('div',{style:{height:'9px',background:C.linesoft,borderRadius:'5px',overflow:'hidden'}},
              h('div',{style:{height:'100%',width:(g.value/maxVal*100)+'%',background:col,borderRadius:'5px'}})),
            h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600,textAlign:'right'}}, self.money(g.value))),
          h('div',{style:{display:'flex',gap:'12px',marginTop:'4px',marginLeft:'16px',fontFamily:C.mono,fontSize:'10px',color:C.mute}},
            h('span',null, g.count+' pc \u00B7 '+self.pct(g.count/totCount,0)+' of range'),
            h('span',null, self.pct(g.value/totVal,0)+' of value'),
            h('span',null, 'avg '+self.money(g.avg)),
            opts.range&&g.min!==g.max? h('span',null, self.money(g.min)+'\u2013'+self.money(g.max)) : null));
      })) ]);
  }

  renderProduct(){ const C=this.C, h=React.createElement, self=this;
    var s=this.slices();
    if(!s.pieces){
      return h('div',null, this.prodHead(0,0),
        h('div',{style:{border:'1px dashed '+C.line,borderRadius:'10px',background:'#FBFAF7',padding:'18px',fontSize:'13px',color:C.soft,marginTop:'12px'}},

    }
    var tc=s.pieces, tv=s.stock, avg=tv/tc;

    var prop=this.dimAgg(s.inv, this.prodProportion);
    var tech=this.dimAgg(s.inv, this.prodTechnique);

    var kpis=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(175px,1fr))',gap:'12px'}},

      self.stat('Techniques', String(tech.length), 'print & make methods', C.soft),

    // value vs volume concentration (key resource-allocation chart)

    ], {marginTop:'14px'});

    // pricing by format
    var priceMax=Math.max.apply(null,silh.map(function(g){return g.max;}));

      self.h3('Pricing architecture by format'),
      self.sub('Average price and the min\u2013max spread within each format'),
      h('div',{style:{marginTop:'14px'}}, silh.map(function(g,i){ var col=self.DCOL[i%self.DCOL.length];
        return h('div',{key:g.key,style:{padding:'10px 0',borderBottom:'1px solid '+C.linesoft}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},
            h('span',{style:{fontSize:'12.5px',fontWeight:600}}, g.key),
            h('span',{style:{fontFamily:C.mono,fontSize:'11.5px',color:C.soft}}, 'avg '+self.money(g.avg))),
          h('div',{style:{position:'relative',height:'8px',background:C.linesoft,borderRadius:'4px'}},
            h('div',{style:{position:'absolute',left:(g.min/priceMax*100)+'%',width:Math.max(2,((g.max-g.min)/priceMax*100))+'%',height:'100%',background:col,borderRadius:'4px'}}),
            h('div',{style:{position:'absolute',left:(g.avg/priceMax*100)+'%',top:'-2px',width:'2px',height:'12px',background:C.ink}})),
          h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'4px',fontFamily:C.mono,fontSize:'9.5px',color:C.mute}},
            h('span',null,self.money(g.min)), h('span',null,self.money(g.max)))); }))
    ], {marginTop:'14px'});

    // automated resource-allocation read
    var topVal=silh[0];
    var lowVal=silh.slice().sort(function(a,z){return (a.value/a.count)-(z.value/z.count);})[0];
    var acc=silh.filter(function(g){return g.key==='Accessory';})[0];
    var reads=[];
    reads.push([topVal.key+' carries the range', topVal.key+' is '+self.pct(topVal.value/tv,0)+' of retail value from just '+self.pct(topVal.count/tc,0)+' of the pieces \u2014 the highest-leverage place to keep designing.']);
    if(acc) reads.push(['Accessories are volume, not value', acc.count+' accessories are '+self.pct(acc.count/tc,0)+' of the range but only '+self.pct(acc.value/tv,0)+' of value. Great as low-price entry hooks; don\u2019t over-invest design time here.']);
    reads.push(['Widest price ladder', 'Prices run '+self.money(Math.min.apply(null,s.inv.map(function(p){return p.price;})))+' to '+self.money(Math.max.apply(null,s.inv.map(function(p){return p.price;})))+'. A '+(Math.max.apply(null,s.inv.map(function(p){return p.price;}))/Math.max(1,Math.min.apply(null,s.inv.map(function(p){return p.price;})))).toFixed(0)+'\u00D7 spread \u2014 make sure each band has a clear reason to exist.']);
    reads.push(['Technique mix', tech.length+' make methods in play ('+tech.map(function(t){return t.key.toLowerCase();}).join(', ')+'). Hand-painted and digital print carry very different cost & time \u2014 track make-hours to protect margin.']);
    var readCard=self.card([

          h('div',null,
            h('div',{style:{fontSize:'13px',fontWeight:600}}, r[0]),

    ], {marginTop:'14px'});

    // price ladder
    var sorted=s.inv.slice().sort(function(a,b){return b.price-a.price;});

  deptTotals(){ var m={}; this.costs.forEach(function(c){ m[c.dept]=(m[c.dept]||0)+c.amt; }); return m; }
  pnlHead(c){ return ['Fabric','Paints','Digital Print','Articles','Art Experiment','Stitching'].indexOf(c.dept)>=0 ? 'Cost of materials consumed' : 'Other expenses'; }
  pnlSub(c){ if(this.pnlHead(c)==='Cost of materials consumed') return c.dept; return c.dept==='Legal'?'Legal & professional':'Advertising & promotion'; }
  pnlBuckets(group){ var self=this, map={}, order=0;
    this.costs.forEach(function(c){
      var head = group==='schedule'? self.pnlHead(c) : group==='dept'? c.dept : self.costClass(c).kind;
      var sub  = group==='schedule'? self.pnlSub(c) : c.dept;
      var sp = self.costSplit(c);
      if(!map[head]) map[head]={head:head, amount:0, base:0, tax:0, subs:{}};
      map[head].amount += c.amt; map[head].base += sp.base; map[head].tax += sp.tax;
      if(!map[head].subs[sub]) map[head].subs[sub]={label:sub, amt:0, base:0, items:[]};
      map[head].subs[sub].amt += c.amt; map[head].subs[sub].base += sp.base;
      map[head].subs[sub].items.push({label:c.item, amt:c.amt, base:sp.base});
    });
    return Object.keys(map).map(function(k){ var b=map[k];
      b.subList=Object.keys(b.subs).map(function(s){return b.subs[s];}).sort(function(a,z){return z.base-a.base;});
      return b; }).sort(function(a,z){return z.base-a.base;});
  }

  // ================= 06 · SCENARIO PLANNER =================
  scCompute(){ var s=this.sc(), t=this.taxonomy();
    var earnedToDate=this.revenue.reduce(function(a,r){return a+r.revenue;},0);
    var effAsp = s.asp*(1-s.discount/100);
    var contrib = effAsp - s.varUnit;                       // per-unit contribution margin
    var cm = effAsp>0? contrib/effAsp : 0;                  // contribution margin %
    var monthlyGross = s.units*effAsp;
    var monthlyVar = s.units*s.varUnit;
    var monthlyProfit = s.units*contrib - s.marketing;      // operating profit/month
    var beUnitsMonthly = contrib>0? s.marketing/contrib : Infinity;  // units/mo to cover ongoing overhead
    var sunk = t.total;                                     // already invested
    var remaining = Math.max(0, sunk - earnedToDate);       // still to recover
    var paybackMonths = monthlyProfit>0? remaining/monthlyProfit : Infinity;
    var horizonRev = monthlyGross*s.horizon;
    var horizonProfit = monthlyProfit*s.horizon;
    var netPosition = earnedToDate + horizonProfit - remaining; // cumulative vs full recovery... simplified
    return {s:s,t:t,effAsp:effAsp,contrib:contrib,cm:cm,monthlyGross:monthlyGross,monthlyVar:monthlyVar,
            monthlyProfit:monthlyProfit,beUnitsMonthly:beUnitsMonthly,sunk:sunk,remaining:remaining,
            paybackMonths:paybackMonths,horizonRev:horizonRev,horizonProfit:horizonProfit,earnedToDate:earnedToDate};
  }

      })),

        h('span',null,'Variable cost / piece: ',h('b',null,self.money(t.varPerUnit))),

    for(var i=0;i<3;i++){

        })),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat('+years.length+',1fr)',gap:'18px',marginTop:'8px'}},
        years.map(function(y){
          return h('div',{key:y.k,style:{textAlign:'center'}},
            h('div',{style:{fontFamily:C.mono,fontSize:'11px',fontWeight:600}}, y.k),
            h('div',{style:{fontSize:'9.5px',color:C.mute,marginBottom:'4px'}}, y.tag),
            h('div',{style:{fontFamily:C.serif,fontSize:'15px',color:y.profit>=0?C.pos:C.neg}}, (y.profit>=0?'+':'')+self.money(y.profit)));
        })),
      h('div',{style:{display:'flex',gap:'18px',marginTop:'14px',flexWrap:'wrap'}},
        self.legend(C.pos,'Revenue'), self.legend(C.neg,'Total cost'))
    ], {marginTop:'14px'});

    // YoY table with growth deltas
    var rows=years.map(function(y,i){
      var prev=i>0?years[i-1]:null;
      var yoY=prev&&prev.rev>0? (y.rev-prev.rev)/prev.rev : null;
      return h('div',{key:y.k,style:{display:'grid',gridTemplateColumns:'110px 1fr 1fr 1fr 90px',gap:'10px',alignItems:'center',padding:'10px 0',borderBottom:'1px solid '+C.linesoft}},
        h('div',null, h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600}},y.k),
          h('span',{style:{fontSize:'9.5px',color:C.mute,marginLeft:'6px'}}, y.actual?'actual':'proj')),
        h('span',{style:{fontFamily:C.mono,fontSize:'12.5px',textAlign:'right'}}, self.money(y.rev)),
        h('span',{style:{fontFamily:C.mono,fontSize:'12.5px',textAlign:'right',color:C.neg}}, self.money(y.cost)),
        h('span',{style:{fontFamily:C.mono,fontSize:'12.5px',fontWeight:600,textAlign:'right',color:y.profit>=0?C.pos:C.neg}}, (y.profit>=0?'':'\u2212')+self.money(Math.abs(y.profit))),
        h('span',{style:{fontFamily:C.mono,fontSize:'11.5px',textAlign:'right',color:yoY==null?C.mute:(yoY>=0?C.pos:C.neg)}}, yoY==null?'\u2014':((yoY>=0?'+':'')+self.pct(yoY,0))));
    });
    var tableHead=h('div',{style:{display:'grid',gridTemplateColumns:'110px 1fr 1fr 1fr 90px',gap:'10px',fontFamily:C.mono,fontSize:'9px',letterSpacing:'0.08em',textTransform:'uppercase',color:C.mute,paddingBottom:'6px',borderBottom:'1px solid '+C.line}},
      h('span',null,'Year'), h('span',{style:{textAlign:'right'}},'Revenue'), h('span',{style:{textAlign:'right'}},'Cost'), h('span',{style:{textAlign:'right'}},'Profit'), h('span',{style:{textAlign:'right'}},'YoY rev'));
    var cumProfit=years.reduce(function(a,y){return a+y.profit;},0);
    var table=self.card([
      self.h3('Year-on-year statement'),
      self.sub('Cumulative 4-year profit: '+((cumProfit>=0?'+':'\u2212'))+self.money(Math.abs(cumProfit))),
      h('div',{style:{marginTop:'12px'}}, tableHead, rows)
    ], {marginTop:'14px'});

    return h('div',null, head, ctrl, chart, table);
  }

  // ================= 06 · INVENTORY MANAGEMENT =================
  renderInventory(){ const C=this.C, h=React.createElement, self=this;
    var s=this.slices();
    if(!s.pieces){
      return h('div',null,
        h('div',{style:{marginTop:'2px'}},
          self.kicker('06 · Inventory'),
          h('h2',{style:{fontFamily:C.serif,fontSize:'25px',margin:'6px 0 0',fontWeight:400}}, 'The stockroom ledger')),
        h('div',{style:{border:'1px dashed '+C.line,borderRadius:'10px',background:'#FBFAF7',padding:'18px',fontSize:'13px',color:C.soft,marginTop:'12px'}},
          'No inventory recorded for this brand. Switch the filter to Both brands or The Hullabalooo.'));
    }
    // group by fabric
    var byFab={};
    s.inv.forEach(function(p){ var f=self.invFabric(p); if(!byFab[f.name]) byFab[f.name]={qty:0,val:0,col:f.col,cats:{}};
      byFab[f.name].qty+=1; byFab[f.name].val+=p.price; byFab[f.name].cats[p.category]=(byFab[f.name].cats[p.category]||0)+1; });
    var fabKeys=Object.keys(byFab).sort(function(a,b){return byFab[b].val-byFab[a].val;});
    var maxFabVal=byFab[fabKeys[0]].val;
    var avg=s.stock/s.pieces;

    var head=h('div',{style:{marginTop:'2px'}},
      self.kicker('06 · Inventory'),
      h('h2',{style:{fontFamily:C.serif,fontSize:'25px',margin:'6px 0 0',fontWeight:400}}, 'Exactly what you\u2019re holding'),
      h('p',{style:{fontFamily:C.serif,fontStyle:'italic',fontSize:'16px',color:C.soft,margin:'8px 0 16px',maxWidth:'820px',lineHeight:1.5}},
        s.pieces+' finished pieces across '+fabKeys.length+' fabrics, worth '+self.money(s.stock)+' at retail. Every SKU is a single unit \u2014 nothing is deep-stocked, so a sale is a stockout.'));

    var kpis=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:'12px'}},
      self.stat('Units on hand', String(s.pieces), 'all quantity 1 \u00B7 single-piece SKUs', C.ink),
      self.stat('Retail value', self.money(s.stock), 'tied up in stock', C.amber),
      self.stat('Fabrics in stock', String(fabKeys.length), fabKeys.join(' \u00B7 '), C.soft),
      self.stat('Avg piece value', self.money(avg), 'per unit at list', C.soft));

    // fabric breakdown
    var fabCard=self.card([
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:'8px'}},
        h('div',null, self.h3('Inventory by fabric'), self.sub('How much you\u2019re holding, in which cloth')),
        h('span',{style:{fontFamily:C.mono,fontSize:'10px',color:C.mute}}, s.pieces+' units')),
      h('div',{style:{marginTop:'14px'}}, fabKeys.map(function(f){ var d=byFab[f];
        var catStr=Object.keys(d.cats).map(function(c){return d.cats[c]+' '+c;}).join(' \u00B7 ');
        return h('div',{key:f,style:{marginBottom:'14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'5px'}},
            h('span',{style:{fontSize:'13.5px',fontWeight:600,display:'flex',alignItems:'center',gap:'8px'}},
              h('span',{style:{width:'10px',height:'10px',borderRadius:'3px',background:d.col,flex:'none'}}), f),
            h('span',{style:{fontFamily:C.mono,fontSize:'12.5px',fontWeight:600}}, d.qty+' pc  \u00B7  '+self.money(d.val))),
          h('div',{style:{height:'12px',background:C.linesoft,borderRadius:'6px',overflow:'hidden'}},
            h('div',{style:{height:'100%',width:(d.val/maxFabVal*100)+'%',background:d.col,borderRadius:'6px'}})),
          h('div',{style:{fontSize:'11px',color:C.mute,marginTop:'4px'}}, catStr));
      })),
      h('div',{style:{fontSize:'11px',color:C.mute,marginTop:'2px',lineHeight:1.5,fontStyle:'italic'}},
        'Fabric is mapped from category and the cloth you actually purchased \u2014 add a fabric column to the INVENTORY tab to make this exact.')
    ], {marginTop:'14px'});

    // full ledger with fabric + low-stock flag
    var sorted=s.inv.slice().sort(function(a,b){return b.price-a.price;});
    var rows=sorted.map(function(p,i){ var f=self.invFabric(p);
      return h('div',{key:i,style:{display:'grid',gridTemplateColumns:'1fr 130px 110px 60px 80px',gap:'10px',alignItems:'center',padding:'9px 0',borderBottom:'1px solid '+C.linesoft}},
        h('span',{style:{fontSize:'12.5px',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, p.name),
        h('span',{style:{fontSize:'11.5px',color:C.soft,display:'flex',alignItems:'center',gap:'6px'}},
          h('span',{style:{width:'7px',height:'7px',borderRadius:'2px',background:f.col,flex:'none'}}), f.name),
        h('span',{style:{fontSize:'11.5px',color:C.mute}}, p.category),
        h('span',{style:{display:'inline-flex',alignItems:'center',gap:'4px',fontFamily:C.mono,fontSize:'11px',color:C.neg,fontWeight:600}},
          h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:C.neg}}), '1 left'),
        h('span',{style:{fontFamily:C.mono,fontSize:'12px',fontWeight:600,textAlign:'right'}}, self.inr(p.price)));
    });
    var ledgerHead=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 130px 110px 60px 80px',gap:'10px',fontFamily:C.mono,fontSize:'9px',letterSpacing:'0.08em',textTransform:'uppercase',color:C.mute,paddingBottom:'6px',borderBottom:'1px solid '+C.line}},
      h('span',null,'Piece'), h('span',null,'Fabric'), h('span',null,'Category'), h('span',null,'On hand'), h('span',{style:{textAlign:'right'}},'Value'));
    var ledger=self.card([
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:'8px'}},
        h('div',null, self.h3('Stock ledger'), self.sub('Every piece \u00B7 all single-unit, all flagged low')),
        h('span',{style:{fontFamily:C.mono,fontSize:'10px',color:C.neg,fontWeight:600}}, s.pieces+' at reorder point')),
      h('div',{style:{marginTop:'12px',maxHeight:'440px',overflowY:'auto'}}, ledgerHead, rows)
    ], {marginTop:'14px'});

    return h('div',null, head, kpis, fabCard, ledger);
  }

  renderVals(){
    var C=this.C, h=React.createElement, self=this;
    var screen;
    if(this.state.tab==='math') screen=this.renderMath();
    else if(this.state.tab==='pnl') screen=this.renderPnl();
    else if(this.state.tab==='costs') screen=this.renderCosts();
    else if(this.state.tab==='product') screen=this.renderProduct();
    else if(this.state.tab==='inventory') screen=this.renderInventory();
    else if(this.state.tab==='planner') screen=this.renderPlanner();
    else if(this.state.tab==='yoy') screen=this.renderYoY();
    else if(this.state.tab==='actions') screen=this.renderActions();
    else screen=this.renderSales();

    var body = h('div',null,
      this.chrome(),
      h('div',{style:{maxWidth:'1440px',margin:'0 auto',padding:'24px 32px 40px'}}, screen));

    return {
      dateStr: new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'long',year:'numeric'}),
      body: body
    };
  }
}
</script>
</body>
</html>
